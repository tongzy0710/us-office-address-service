<!doctype html>
<html lang='zh-CN'>
<head>
  <meta charset='UTF-8' />
  <meta name='viewport' content='width=device-width, initial-scale=1.0' />
  <title>美国办公室地址服务系统</title>
  <style>
    :root{--bg:#f6f1e8;--panel:#fbf8f2;--ink:#1f2933;--soft:#55616f;--muted:#7b8794;--line:rgba(31,41,51,.1);--broker:#c76832;--tenant:#2e86ab;--admin:#33673b}
    *{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top left,rgba(199,104,50,.12),transparent 28%),radial-gradient(circle at bottom right,rgba(46,134,171,.12),transparent 28%),var(--bg);color:var(--ink);font-family:'Noto Sans SC','PingFang SC','Hiragino Sans GB',system-ui,sans-serif}a{text-decoration:none;color:inherit}button,input,select,textarea{font:inherit}button{cursor:pointer}#app{max-width:1480px;margin:0 auto;padding:20px} .card,.panel,.table{background:#fff;border:1px solid var(--line);border-radius:28px;box-shadow:0 16px 50px rgba(20,24,40,.06)} .bar{height:10px;background:var(--broker)} .hero{overflow:hidden}.hero .inner{padding:28px;display:grid;gap:24px}.eyebrow{font-size:12px;font-weight:700;letter-spacing:.28em;text-transform:uppercase;color:var(--muted)}h1,h2,h3,p{margin:0}.title{font-size:clamp(32px,5vw,56px);line-height:1.1}.copy{color:var(--soft);line-height:1.8}.grid3,.grid2,.grid4,.layoutBroker,.layoutDesk{display:grid;gap:20px}.grid3{grid-template-columns:repeat(3,minmax(0,1fr))}.grid2{grid-template-columns:repeat(2,minmax(0,1fr))}.grid4{grid-template-columns:repeat(4,minmax(0,1fr))}.layoutBroker{grid-template-columns:340px minmax(0,1fr)}.layoutDesk{grid-template-columns:280px minmax(0,1fr) 360px}.section{margin-top:22px}.panel{padding:22px}.stack{display:flex;flex-direction:column;gap:16px}.row,.tabs,.chips{display:flex;flex-wrap:wrap;gap:10px}.chip{display:inline-flex;align-items:center;border-radius:999px;padding:7px 12px;font-size:12px;font-weight:700;background:rgba(31,41,51,.06)}.good{background:#dff7e6;color:#135d26}.warn{background:#fff1c7;color:#7a5700}.info{background:#dff1fb;color:#0d5270}.danger{background:#ffe0e3;color:#8e1f2d}.btn,.tab{border:1px solid var(--line);border-radius:999px;padding:11px 16px;background:#fff;font-weight:700}.primary{background:var(--ink);color:#fff;border-color:transparent}.broker{background:var(--broker);color:#fff;border-color:transparent}.admin{background:var(--admin);color:#fff;border-color:transparent}.active.brokerTab{background:var(--broker);color:#fff;border-color:transparent}.fieldGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.field{display:flex;flex-direction:column;gap:8px}.label{font-size:13px;font-weight:700}.input,.select,.textarea{width:100%;border:1px solid var(--line);border-radius:18px;padding:12px 14px;background:#fff}.textarea{min-height:86px;resize:vertical}.record{border:1px solid var(--line);border-radius:22px;background:#fff;padding:16px}.record.active{border-color:var(--broker);background:#fff9f5}.meta{font-size:13px;color:var(--muted)}.metric{border:1px solid var(--line);border-radius:24px;background:var(--panel);padding:20px}.metric .num{font-size:34px;font-weight:700}.message{border-radius:22px;padding:14px 16px;font-size:14px;font-weight:700}.table{overflow:hidden}table{width:100%;border-collapse:collapse;font-size:14px}thead{background:var(--panel);color:var(--muted)}th,td{padding:14px 16px;text-align:left;border-top:1px solid var(--line);vertical-align:top}thead th{border-top:none}.login{max-width:1240px;margin:0 auto;display:grid;gap:20px;grid-template-columns:1fr 1fr;padding:20px}.small{font-size:12px;color:var(--muted)} ul{margin:0;padding-left:18px;color:var(--soft);line-height:1.9} @media (max-width:1100px){.grid3,.grid2,.grid4,.layoutBroker,.layoutDesk,.login,.fieldGrid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div id='app'></div>
  <script>
    const STATE_KEY='us-office-public-demo-state';
    const SESSION_KEY='us-office-public-demo-session';
    const emptyForm=()=>({buildingId:'',roomId:'',rawAddress:'',name:'',city:'',state:'CA',zip:'',paymentFlowStatus:'待确认',paymentFlowNote:'默认期望：先付 1 个月押金锁定地址，注册公司成功后再由新公司主体签正式合同。',electricBillMode:'主账单 + suite 子账单',broadbandBillStatus:'无',verificationSource:'中介口头确认',exteriorDescription:'',neighborhoodDescription:'',outsidePhotoCount:0,suite:'',locationDescription:'',sizeSf:'',rentUsd:'',availabilityStatus:'当前可用',paymentMethod:'Bank Transfer',leaseTerm:'12 months',depositText:'1 个月押金',statusNote:'',riskNote:'',insidePhotoCount:0});
    const normText=v=>(v||'').trim().replace(/\s+/g,' ').toLowerCase();
    const normAddress=v=>normText(v).replace(/[,.]/g,'');
    const normSuite=v=>normText(v).replace(/suite/g,'ste').replace(/\s+/g,'');
    const money=v=>'$'+Number(v||0).toFixed(2)+' / 月';
    const seed=()=>({contacts:{wechat:'ccMonet-service',phone:'+1 (669) 555-0198',email:'service@ccmonet.example'},leads:[{id:'lead-1',company:'Shenzhen Seller Ltd.',need:'预算 $500 内，需要先注册公司',target:'Santa Clara Tech Park / Ste 207',owner:'客服 Mia',status:'待联系'},{id:'lead-2',company:'Hangzhou Cross-border Tech',need:'需要可接受的电费账单方案、宽带账单和门牌',target:'Downtown San Jose Office / Ste 301',owner:'客服 Lynn',status:'待跟进'}],buildings:[{id:'building-1',name:'Santa Clara Tech Park',rawAddress:'4701 Patrick Henry Dr, Santa Clara, CA 95054',standardizedAddress:normAddress('4701 Patrick Henry Dr, Santa Clara, CA 95054'),city:'Santa Clara',state:'CA',zip:'95054',reviewStatus:'已审核通过',paymentFlowStatus:'接受',paymentFlowNote:'支持先付 1 个月押金锁定地址，注册成功后再签正式合同。',electricBillMode:'主账单 + suite 子账单',broadbandBillStatus:'有',verificationSource:'后台已复核',exteriorDescription:'科技园园区办公楼，商务属性明确。',neighborhoodDescription:'周边公司密集，方便正式经营。',currentMaintainerBrokerId:'broker:13800000001',currentMaintainerBrokerName:'湾区合作中介 A',outsidePhotoCount:3,rooms:[{id:'room-1',suite:'Ste 207',locationDescription:'2F / near elevator',sizeSf:319,rentUsd:478.5,availabilityStatus:'当前可用',auditStatus:'已审核通过',tenantDisplayStatus:'可咨询',statusNote:'曾租给跨境电商公司，历史注册地址已清理。',paymentMethod:'Bank Transfer',leaseTerm:'12 months',depositText:'1 个月押金',insidePhotoCount:3},{id:'room-2',suite:'Ste 207D',locationDescription:'2F east side',sizeSf:175,rentUsd:437.5,availabilityStatus:'待确认',auditStatus:'待补充',tenantDisplayStatus:'暂停推荐',statusNote:'待补门牌号照片。',paymentMethod:'Bank Transfer',leaseTerm:'12 months',depositText:'1 个月押金',insidePhotoCount:2}]},{id:'building-2',name:'Downtown San Jose Office',rawAddress:'84 W Santa Clara St, San Jose, CA 95113',standardizedAddress:normAddress('84 W Santa Clara St, San Jose, CA 95113'),city:'San Jose',state:'CA',zip:'95113',reviewStatus:'待审核',paymentFlowStatus:'接受',paymentFlowNote:'已确认接受标准签约付款流程。',electricBillMode:'电力公司直开 suite 账单',broadbandBillStatus:'有',verificationSource:'中介现场看过样本',exteriorDescription:'市中心正式办公楼。',neighborhoodDescription:'交通便利。',currentMaintainerBrokerId:'broker:13800000002',currentMaintainerBrokerName:'硅谷合作中介 B',outsidePhotoCount:2,rooms:[{id:'room-3',suite:'Ste 301',locationDescription:'3F front corner',sizeSf:260,rentUsd:620,availabilityStatus:'当前可用',auditStatus:'待审核',tenantDisplayStatus:'暂停推荐',statusNote:'资料完整，等待后台放行。',paymentMethod:'Bank Transfer',leaseTerm:'12 months',depositText:'1 个月押金',insidePhotoCount:2}]}]});
    const loadState=()=>{try{return JSON.parse(localStorage.getItem(STATE_KEY))||seed()}catch{return seed()}};
    const saveState=()=>localStorage.setItem(STATE_KEY,JSON.stringify(state));
    const loadSession=()=>{try{return JSON.parse(localStorage.getItem(SESSION_KEY))||null}catch{return null}};
    const saveSession=v=>v?localStorage.setItem(SESSION_KEY,JSON.stringify(v)):localStorage.removeItem(SESSION_KEY);
    const roomStatus=(b,r)=>b.reviewStatus==='地址预审未通过'?'地址预审未通过':r.auditStatus==='待补充'||b.reviewStatus==='已退回补充'?'待补充':r.auditStatus==='待审核'?'已提交':r.auditStatus==='已审核通过'?'已审核':'草稿';
    const tone=t=>/已审核|可咨询|当前可用|接受|通过/.test(t)?'good':/待|草稿/.test(t)?'warn':/未通过|退回|暂不|不可/.test(t)?'danger':'info';
    const h=()=>location.hash.replace(/^#/,'')||'home';
    const byId=id=>document.getElementById(id);
    let state=loadState(),session=loadSession(),flash=null,brokerTab='create',brokerRoomId='',tenantRoomId='',adminBuildingId='',adminRoomId='',adminBatch=[],compare=[],form=emptyForm();
    function top(title,summary,color){return `<section class='card hero'><div class='bar' style='background:${color}'></div><div class='inner'><div><div class='eyebrow'>${session?session.name:''}</div><h1 class='title' style='font-size:42px'>${title}</h1><p class='copy' style='margin-top:12px'>${summary}</p></div><div class='row'><a class='btn' href='#home'>返回首页</a><button class='btn primary' onclick='logout()'>退出登录</button></div></div></section>`}
    function home(){return `<section class='card hero'><div class='bar'></div><div class='inner'><div><div class='eyebrow'>CC Monet</div><h1 class='title'>美国办公室地址服务系统</h1><p class='copy'>公开演示版包含中介端、租客端、管理端三类入口。登录后即可查看不同角色的实际操作界面。</p></div><div class='panel'><div class='chips'><span class='chip good'>中介可登录</span><span class='chip good'>租客可登录</span><span class='chip good'>管理端可登录</span></div><div class='copy' style='margin-top:14px'>管理端账号：admin<br />管理端密码：ccMonet</div></div></div></section><section class='section grid3'><a class='card panel' href='#login-broker'><h2>中介端</h2><p class='copy' style='margin-top:10px'>手机优先录入楼栋与 office 信息，支持保存草稿和提交审核。</p></a><a class='card panel' href='#login-tenant'><h2>租客端</h2><p class='copy' style='margin-top:10px'>电脑端筛选、查阅与对比已审核通过的办公室。</p></a><a class='card panel' href='#login-admin'><h2>管理端</h2><p class='copy' style='margin-top:10px'>按楼栋审核，再处理具体房间和租客线索。</p></a></section>`}
    function loginView(role){const titles={broker:'中介登录',tenant:'租客登录',admin:'管理端登录'},colors={broker:'var(--broker)',tenant:'var(--tenant)',admin:'var(--admin)'};return `<div class='login'><section class='card panel'><div class='eyebrow'>CC Monet</div><h1 style='font-size:40px;margin-top:14px'>美国办公室地址服务系统</h1><p class='copy' style='margin-top:12px'>公开演示版登录页。中介和租客输入手机号即可进入，管理端使用固定账号密码。</p><div class='section stack'><a class='record ${role==='broker'?'active':''}' href='#login-broker'>中介登录</a><a class='record ${role==='tenant'?'active':''}' href='#login-tenant'>租客登录</a><a class='record ${role==='admin'?'active':''}' href='#login-admin'>管理端登录</a></div></section><section class='card panel'><div class='bar' style='background:${colors[role]}'></div><h2 style='margin-top:20px'>${titles[role]}</h2>${flash?`<div class='message ${flash.tone}' style='margin-top:16px'>${flash.text}</div>`:''}<div class='section stack'>${role==='admin'?`<label class='field'><span class='label'>账号</span><input id='u' class='input' value='admin' /></label><label class='field'><span class='label'>密码</span><input id='p' class='input' type='password' value='ccMonet' /></label>`:`<label class='field'><span class='label'>手机号</span><input id='phone' class='input' placeholder='请输入手机号' /></label><label class='field'><span class='label'>${role==='broker'?'中介名称（可选）':'公司或姓名（可选）'}</span><input id='name' class='input' /></label>`}<div class='row'><button class='btn primary' onclick="handleLogin('${role}')">登录并进入</button><a class='btn' href='#home'>返回首页</a></div></div></section></div>`}
    function brokerData(){if(!session||session.role!=='broker')return[];return state.buildings.filter(b=>b.currentMaintainerBrokerId===session.id).flatMap(b=>b.rooms.map(r=>({building:b,room:r,visibleStatus:roomStatus(b,r)})))}
    function brokerPage(){const all=brokerData();const list=brokerTab==='draft'?all.filter(x=>x.room.auditStatus==='草稿'):brokerTab==='supplement'?all.filter(x=>x.room.auditStatus==='待补充'||x.building.reviewStatus==='已退回补充'):brokerTab==='submitted'?all.filter(x=>x.room.auditStatus==='待审核'||x.room.auditStatus==='已审核通过'):all;if(!brokerRoomId&&all[0])brokerRoomId=all[0].room.id;return `${top('中介端工作台','手机优先录入和补录，先楼栋、后 office。','var(--broker)')}${flash?`<div class='message ${flash.tone}' style='margin-top:16px'>${flash.text}</div>`:''}<section class='section layoutBroker'><div class='stack'><div class='panel'><h2>导航</h2><div class='tabs section'><button class='tab ${brokerTab==='create'?'active brokerTab':''}' onclick="brokerTab='create';render()">新增 office</button><button class='tab ${brokerTab==='draft'?'active brokerTab':''}' onclick="brokerTab='draft';render()">我的草稿箱</button><button class='tab ${brokerTab==='supplement'?'active brokerTab':''}' onclick="brokerTab='supplement';render()">待补充</button><button class='tab ${brokerTab==='submitted'?'active brokerTab':''}' onclick="brokerTab='submitted';render()">已提交</button></div></div><div class='panel'><h2>${brokerTab==='create'?'我的 office':'当前列表'}</h2><div class='stack section'>${list.length?list.map(x=>`<button class='record ${brokerRoomId===x.room.id?'active':''}' onclick="loadBroker('${x.room.id}')"><div style='display:flex;justify-content:space-between;gap:12px'><div><h3>${x.room.suite}</h3><p class='meta' style='margin-top:4px'>${x.building.name}</p></div><span class='chip ${tone(x.visibleStatus)}'>${x.visibleStatus}</span></div><p class='copy' style='margin-top:10px'>${money(x.room.rentUsd)} · ${x.room.sizeSf||'-'} SF</p></button>`).join(''):`<div class='record'><p class='copy'>当前没有对应记录。</p></div>`}</div></div></div><div class='stack'><div class='panel'><h2>楼栋信息</h2><div class='fieldGrid section'>${field('f-rawAddress','完整地址',form.rawAddress)}${field('f-name','楼栋名称',form.name)}${field('f-city','城市',form.city)}${field('f-state','州',form.state)}${field('f-zip','邮编',form.zip)}${select('f-paymentFlowStatus','标准签约付款流程',['接受','不接受','待确认'],form.paymentFlowStatus)}${select('f-electricBillMode','电费账单提供能力',['电力公司直开 suite 账单','主账单 + suite 子账单','仅公共电费主账单','无法提供任何电费账单'],form.electricBillMode)}${select('f-broadbandBillStatus','宽带账单提供能力',['有','无'],form.broadbandBillStatus)}${select('f-verificationSource','核验可信度 / 来源',['中介口头确认','中介现场看过样本','后台已复核'],form.verificationSource)}${field('f-outsidePhotoCount','外围照片数量',form.outsidePhotoCount,'number')}</div><div class='stack section'>${area('f-paymentFlowNote','付款流程说明',form.paymentFlowNote)}${area('f-exteriorDescription','楼栋外观描述',form.exteriorDescription)}${area('f-neighborhoodDescription','周边环境描述',form.neighborhoodDescription)}</div></div><div class='panel'><h2>office 信息</h2><div class='fieldGrid section'>${field('f-suite','Suite / 房间号',form.suite)}${select('f-availabilityStatus','房间当前可用状态',['当前可用','已出租','待确认','不可租'],form.availabilityStatus)}${field('f-locationDescription','位置描述',form.locationDescription)}${field('f-sizeSf','面积（SF）',form.sizeSf,'number')}${field('f-rentUsd','月租金（USD）',form.rentUsd,'number')}${field('f-paymentMethod','付款方式',form.paymentMethod)}${field('f-leaseTerm','租期',form.leaseTerm)}${field('f-depositText','押金说明',form.depositText)}${select('f-mailScan','信件扫描服务',['不提供','提供，但需要收费','可以免费提供部分，超出部分收费'],form.mailScan)}${select('f-forwarding','境内 / 国际转寄服务',['不提供','提供，但需要收费','可以免费提供部分，超出部分收费'],form.forwarding)}${select('f-suitability','是否适合跨境电商客户',['是','否','待判断'],form.suitability)}${field('f-insidePhotoCount','房间内部照片数量',form.insidePhotoCount,'number')}</div><div class='stack section'>${area('f-statusNote','房间状态说明',form.statusNote)}${area('f-riskNote','风险备注',form.riskNote)}</div><div class='row section'><button class='btn' onclick='resetForm()'>新建空白记录</button><button class='btn broker' onclick="saveForm('draft')">保存到草稿箱</button><button class='btn primary' onclick="saveForm('submit')">提交审核</button></div></div></div></section>`}
    function tenantRows(){return state.buildings.flatMap(b=>b.rooms.filter(r=>b.reviewStatus!=='地址预审未通过'&&r.auditStatus==='已审核通过'&&r.tenantDisplayStatus!=='暂停推荐').map(r=>({building:b,room:r})))}
    function tenantPage(){const q=(byId('t-q')?byId('t-q').value:'').trim().toLowerCase();const city=byId('t-city')?byId('t-city').value:'全部城市';const rows=tenantRows().filter(x=>(!q||[x.building.name,x.room.suite,x.building.city,x.building.rawAddress].join(' ').toLowerCase().includes(q))&&(city==='全部城市'||x.building.city===city));if(!tenantRoomId&&rows[0])tenantRoomId=rows[0].room.id;const picked=rows.find(x=>x.room.id===tenantRoomId)||rows[0];const cities=['全部城市',...new Set(tenantRows().map(x=>x.building.city))];return `${top('租客端工作台','电脑端筛选、查阅和对比已审核通过的办公室。','var(--tenant)')}<section class='section grid3'><div class='metric'><div class='small'>可浏览房源</div><div class='num'>${rows.length}</div><div class='copy'>当前筛选结果</div></div><div class='metric'><div class='small'>支持宽带账单</div><div class='num'>${rows.filter(x=>x.building.broadbandBillStatus==='有').length}</div><div class='copy'>楼栋级账单提供能力</div></div><div class='metric'><div class='small'>已加入对比</div><div class='num'>${compare.length}</div><div class='copy'>最多同时对比 3 套</div></div></section><section class='section layoutDesk'><div class='stack'><div class='panel'><h2>筛选条件</h2>${field('t-q','搜索',q)}<div class='fieldGrid section'>${select('t-city','城市',cities,city)}</div><div class='section'><button class='btn primary' onclick='render()'>更新筛选</button></div></div></div><div class='stack'><div class='table'><table><thead><tr><th>房源</th><th>城市 / 地址</th><th>月租</th><th>账单能力</th><th>操作</th></tr></thead><tbody>${rows.length?rows.map(x=>`<tr><td><strong>${x.building.name} / ${x.room.suite}</strong><div class='small'>${x.room.locationDescription||''}</div></td><td>${x.building.city}<div class='small'>${x.building.rawAddress}</div></td><td>${money(x.room.rentUsd)}</td><td><span class='chip info'>${x.building.electricBillMode}</span><div style='margin-top:8px'><span class='chip ${x.building.broadbandBillStatus==='有'?'good':''}'>宽带账单${x.building.broadbandBillStatus}</span></div></td><td><div class='row'><button class='btn' onclick="tenantRoomId='${x.room.id}';render()">查看详情</button><button class='btn' onclick="toggleCompare('${x.room.id}')">${compare.includes(x.room.id)?'移出对比':'加入对比'}</button></div></td></tr>`).join(''):`<tr><td colspan='5'>当前筛选条件下没有可展示房源。</td></tr>`}</tbody></table></div><div class='panel'><h2>对比区</h2><div class='section row'>${rows.filter(x=>compare.includes(x.room.id)).slice(0,3).map(x=>`<div class='record' style='flex:1 1 220px'><h3>${x.building.name} / ${x.room.suite}</h3><p class='meta' style='margin-top:6px'>${x.building.city}</p><p class='copy' style='margin-top:10px'>${money(x.room.rentUsd)} · ${x.room.sizeSf||'-'} SF</p></div>`).join('')||`<div class='record'><p class='copy'>还没有加入对比的房源。</p></div>`}</div></div></div><div class='stack'><div class='panel'><h2>房源详情</h2>${picked?`<div class='record'><div style='display:flex;justify-content:space-between;gap:12px'><div><h3>${picked.building.name} / ${picked.room.suite}</h3><p class='meta' style='margin-top:6px'>${picked.building.rawAddress}</p></div><span class='chip ${tone(picked.room.tenantDisplayStatus)}'>${picked.room.tenantDisplayStatus}</span></div><div class='section stack'><p class='copy'>${money(picked.room.rentUsd)} · ${picked.room.sizeSf||'-'} SF</p><p class='copy'>${picked.building.electricBillMode}</p><p class='copy'>${picked.building.broadbandBillStatus==='有'?'支持公司抬头宽带账单':'当前无公司抬头宽带账单能力'}</p><p class='copy'>${picked.building.paymentFlowNote}</p></div></div>`:`<p class='copy'>请选择一套房源查看详情。</p>`}</div><div class='panel'><h2>联系客服</h2><p class='copy'>微信：${state.contacts.wechat}</p><p class='copy'>电话：${state.contacts.phone}</p><p class='copy'>邮箱：${state.contacts.email}</p></div></div></section>`}
    function adminPage(){const buildings=state.buildings;if(!adminBuildingId&&buildings[0])adminBuildingId=buildings[0].id;const building=buildings.find(x=>x.id===adminBuildingId)||buildings[0];const room=building&&(building.rooms.find(x=>x.id===adminRoomId)||building.rooms[0]);return `${top('管理端工作台','先按楼栋审核，再进入楼栋详情处理房间信息。','var(--admin)')}${flash?`<div class='message ${flash.tone}' style='margin-top:16px'>${flash.text}</div>`:''}<section class='section grid4'><div class='metric'><div class='small'>楼栋总数</div><div class='num'>${buildings.length}</div><div class='copy'>所有录入楼栋</div></div><div class='metric'><div class='small'>待审核楼栋</div><div class='num'>${buildings.filter(x=>x.reviewStatus==='待审核'||x.reviewStatus==='待预审').length}</div><div class='copy'>优先处理对象</div></div><div class='metric'><div class='small'>房间待补充</div><div class='num'>${buildings.flatMap(x=>x.rooms).filter(x=>x.auditStatus==='待补充').length}</div><div class='copy'>需退回中介</div></div><div class='metric'><div class='small'>租客线索</div><div class='num'>${state.leads.length}</div><div class='copy'>当前线索数量</div></div></section><section class='section stack'><div class='table'><table><thead><tr><th>楼栋</th><th>地址</th><th>维护中介</th><th>房间数</th><th>审核状态</th><th>操作</th></tr></thead><tbody>${buildings.map(x=>`<tr><td><strong>${x.name}</strong><div class='small'>${x.city}</div></td><td>${x.rawAddress}<div class='small'>账单能力：${x.electricBillMode}</div></td><td>${x.currentMaintainerBrokerName}</td><td>${x.rooms.length}</td><td><span class='chip ${tone(x.reviewStatus)}'>${x.reviewStatus}</span></td><td><button class='btn' onclick="pickBuilding('${x.id}')">详情</button></td></tr>`).join('')}</tbody></table></div>${building?`<div class='grid2'><div class='panel'><h2>楼栋详情</h2><div class='fieldGrid section'><div class='record'><div class='small'>楼栋名称</div><div>${building.name}</div></div><div class='record'><div class='small'>地址</div><div>${building.rawAddress}</div></div><div class='record'><div class='small'>电费账单提供能力</div><div>${building.electricBillMode}</div></div><div class='record'><div class='small'>宽带账单提供能力</div><div>${building.broadbandBillStatus}</div></div></div><div class='fieldGrid section'>${select('a-review','楼栋审核状态',['待预审','地址预审待复核','地址预审未通过','预审通过','待审核','已审核通过','已退回补充','暂不采用'],building.reviewStatus)}${field('a-maintainerName','维护中介名称',building.currentMaintainerBrokerName)}${field('a-maintainerId','维护中介账号 ID',building.currentMaintainerBrokerId)}${field('a-contactPhone','客服电话',state.contacts.phone)}${field('a-contactWechat','客服微信',state.contacts.wechat)}${field('a-contactEmail','客服邮箱',state.contacts.email)}</div><div class='section'><button class='btn admin' onclick="saveAdminBuilding('${building.id}')">保存楼栋与联系方式</button></div></div><div class='panel'><h2>房间审批</h2><div class='row'><button class='btn' onclick="toggleAllRooms('${building.id}')">${adminBatch.length===building.rooms.length?'取消全选':'全选当前楼栋房间'}</button><span class='chip info'>已选 ${adminBatch.length} 个房间</span></div><div class='table section'><table><thead><tr><th>选择</th><th>房间</th><th>月租</th><th>状态</th><th>详情</th></tr></thead><tbody>${building.rooms.map(r=>`<tr><td><input type='checkbox' ${adminBatch.includes(r.id)?'checked':''} onchange="toggleRoom('${r.id}')" /></td><td><strong>${r.suite}</strong><div class='small'>${r.locationDescription||''}</div></td><td>${money(r.rentUsd)}</td><td><span class='chip ${tone(r.auditStatus)}'>${r.auditStatus}</span></td><td><button class='btn' onclick="pickRoom('${r.id}')">详情</button></td></tr>`).join('')}</tbody></table></div><div class='row section'><button class='btn admin' onclick="batchRooms('${building.id}','approve')">批量通过</button><button class='btn' onclick="batchRooms('${building.id}','return')">批量退回补充</button><button class='btn' onclick="batchRooms('${building.id}','pause')">批量暂停推荐</button></div></div></div>${room?`<div class='panel'><h2>房间详情</h2><div class='fieldGrid section'>${select('a-roomAudit','房间审核状态',['草稿','待审核','待补充','已审核通过','暂不采用'],room.auditStatus)}${select('a-roomAvailability','当前可租状态',['当前可用','已出租','待确认','不可租'],room.availabilityStatus)}${select('a-roomDisplay','租客端展示状态',['可咨询','已出租','暂停推荐'],room.tenantDisplayStatus)}</div><div class='section stack'>${area('a-roomStatusNote','房间状态说明',room.statusNote||'')}${area('a-roomRiskNote','风险备注',room.riskNote||'')}</div><div class='section'><button class='btn admin' onclick="saveAdminRoom('${building.id}','${room.id}')">保存房间详情</button></div></div>`:''}<div class='panel'><h2>租客线索</h2><div class='table'><table><thead><tr><th>公司名</th><th>需求</th><th>意向房源</th><th>跟进人</th><th>状态</th></tr></thead><tbody>${state.leads.map(l=>`<tr><td><strong>${l.company}</strong></td><td>${l.need}</td><td>${l.target}</td><td>${l.owner}</td><td><span class='chip ${tone(l.status)}'>${l.status}</span></td></tr>`).join('')}</tbody></table></div></div>`:''}</section>`}
    function field(id,label,value,type='text'){return `<label class='field'><span class='label'>${label}</span><input id='${id}' class='input' type='${type}' value='${String(value??'').replace(/'/g,'&#39;')}' /></label>`}
    function select(id,label,options,value){return `<label class='field'><span class='label'>${label}</span><select id='${id}' class='select'>${options.map(o=>`<option value='${o}' ${o===value?'selected':''}>${o}</option>`).join('')}</select></label>`}
    function area(id,label,value){return `<label class='field'><span class='label'>${label}</span><textarea id='${id}' class='textarea'>${String(value||'')}</textarea></label>`}
    function setFlash(toneValue,text){flash={tone:toneValue,text};render()}
    function handleLogin(role){if(role==='admin'){if(byId('u').value!=='admin'||byId('p').value!=='ccMonet'){setFlash('danger','管理员账号或密码错误。');return}session={role:'admin',id:'admin',name:'管理后台'}}else{if(!byId('phone').value.trim()){setFlash('danger','请输入手机号。');return}session={role,id:role+':'+byId('phone').value.trim(),name:(byId('name').value.trim()||(role==='broker'?'中介 ':'租客 ')+byId('phone').value.trim().slice(-4)),phone:byId('phone').value.trim()}}saveSession(session);flash=null;location.hash=role}
    function logout(){session=null;saveSession(null);flash=null;location.hash='home'}
    function loadBroker(id){const found=brokerData().find(x=>x.room.id===id);if(!found)return;brokerRoomId=id;form={...emptyForm(),buildingId:found.building.id,roomId:found.room.id,rawAddress:found.building.rawAddress,name:found.building.name,city:found.building.city,state:found.building.state,zip:found.building.zip,paymentFlowStatus:found.building.paymentFlowStatus,paymentFlowNote:found.building.paymentFlowNote,electricBillMode:found.building.electricBillMode,broadbandBillStatus:found.building.broadbandBillStatus,verificationSource:found.building.verificationSource,exteriorDescription:found.building.exteriorDescription,neighborhoodDescription:found.building.neighborhoodDescription,outsidePhotoCount:found.building.outsidePhotoCount||0,suite:found.room.suite,locationDescription:found.room.locationDescription,sizeSf:found.room.sizeSf,rentUsd:found.room.rentUsd,availabilityStatus:found.room.availabilityStatus,paymentMethod:found.room.paymentMethod,leaseTerm:found.room.leaseTerm,depositText:found.room.depositText,statusNote:found.room.statusNote,riskNote:found.room.riskNote,insidePhotoCount:found.room.insidePhotoCount||0};brokerTab='create';render()}
    function resetForm(){brokerRoomId='';form=emptyForm();flash=null;brokerTab='create';render()}
    function saveForm(mode){['rawAddress','name','city','state','zip','paymentFlowStatus','paymentFlowNote','electricBillMode','broadbandBillStatus','verificationSource','exteriorDescription','neighborhoodDescription','outsidePhotoCount','suite','locationDescription','sizeSf','rentUsd','availabilityStatus','paymentMethod','leaseTerm','depositText','statusNote','riskNote','mailScan','forwarding','suitability','insidePhotoCount'].forEach(k=>{const node=byId('f-'+k);if(node)form[k]=node.value});if(!form.rawAddress.trim()||!form.suite.trim()){setFlash('danger','完整地址和 Suite / 房间号不能为空。');return}if(mode==='submit'&&(Number(form.outsidePhotoCount)<2||Number(form.insidePhotoCount)<2)){setFlash('danger','提交前请补齐外围至少 2 张、房间内部至少 2 张照片。');return}const std=normAddress(form.rawAddress),ns=normSuite(form.suite);const other=state.buildings.find(b=>b.standardizedAddress===std&&b.currentMaintainerBrokerId!==session.id&&b.id!==form.buildingId);if(other){setFlash('danger','该地址已由 '+other.currentMaintainerBrokerName+' 维护，请联系后台转交。');return}let building=state.buildings.find(b=>b.id===form.buildingId)||state.buildings.find(b=>b.standardizedAddress===std&&b.currentMaintainerBrokerId===session.id);if(building){const dup=building.rooms.find(r=>normSuite(r.suite)===ns&&r.id!==form.roomId);if(dup){setFlash('danger','同一标准化地址 + 同一 Suite 一期不允许重复创建。');return}}const buildingId=building?building.id:'building-'+Date.now();const roomId=form.roomId||'room-'+Date.now();const nextBuilding={...(building||{}),id:buildingId,name:form.name.trim(),rawAddress:form.rawAddress.trim(),standardizedAddress:std,city:form.city.trim(),state:form.state.trim(),zip:form.zip.trim(),reviewStatus:building&&building.reviewStatus!=='已退回补充'?building.reviewStatus:'待预审',paymentFlowStatus:form.paymentFlowStatus,paymentFlowNote:form.paymentFlowNote.trim(),electricBillMode:form.electricBillMode,broadbandBillStatus:form.broadbandBillStatus,verificationSource:form.verificationSource,exteriorDescription:form.exteriorDescription.trim(),neighborhoodDescription:form.neighborhoodDescription.trim(),currentMaintainerBrokerId:session.id,currentMaintainerBrokerName:session.name,outsidePhotoCount:Number(form.outsidePhotoCount||0),rooms:(building&&building.rooms)||[]};const nextRoom={id:roomId,suite:form.suite.trim(),locationDescription:form.locationDescription.trim(),sizeSf:Number(form.sizeSf||0),rentUsd:Number(form.rentUsd||0),availabilityStatus:form.availabilityStatus,auditStatus:mode==='submit'?'待审核':'草稿',tenantDisplayStatus:'暂停推荐',statusNote:form.statusNote.trim(),paymentMethod:form.paymentMethod.trim(),leaseTerm:form.leaseTerm.trim(),depositText:form.depositText.trim(),riskNote:form.riskNote.trim(),insidePhotoCount:Number(form.insidePhotoCount||0)};nextBuilding.rooms=nextBuilding.rooms.some(r=>r.id===roomId)?nextBuilding.rooms.map(r=>r.id===roomId?nextRoom:r):[...nextBuilding.rooms,nextRoom];state.buildings=state.buildings.some(b=>b.id===buildingId)?state.buildings.map(b=>b.id===buildingId?nextBuilding:b):[nextBuilding,...state.buildings];saveState();brokerRoomId=roomId;brokerTab=mode==='submit'?'submitted':'draft';setFlash(mode==='submit'?'info':'good',mode==='submit'?'已提交审核。':'草稿已保存。');loadBroker(roomId)}
    function toggleCompare(id){compare=compare.includes(id)?compare.filter(x=>x!==id):compare.length>=3?[...compare.slice(1),id]:[...compare,id];render()}
    function pickBuilding(id){adminBuildingId=id;adminBatch=[];const b=state.buildings.find(x=>x.id===id);adminRoomId=b&&b.rooms[0]?b.rooms[0].id:'';render()}
    function pickRoom(id){adminRoomId=id;render()}
    function toggleRoom(id){adminBatch=adminBatch.includes(id)?adminBatch.filter(x=>x!==id):[...adminBatch,id];render()}
    function toggleAllRooms(buildingId){const b=state.buildings.find(x=>x.id===buildingId);if(!b)return;adminBatch=adminBatch.length===b.rooms.length?[]:b.rooms.map(r=>r.id);render()}
    function saveAdminBuilding(buildingId){state.buildings=state.buildings.map(b=>b.id===buildingId?{...b,reviewStatus:byId('a-review').value,currentMaintainerBrokerName:byId('a-maintainerName').value,currentMaintainerBrokerId:byId('a-maintainerId').value}:b);state.contacts.phone=byId('a-contactPhone').value;state.contacts.wechat=byId('a-contactWechat').value;state.contacts.email=byId('a-contactEmail').value;saveState();setFlash('good','楼栋信息和联系方式已更新。')}
    function saveAdminRoom(buildingId,roomId){state.buildings=state.buildings.map(b=>b.id===buildingId?{...b,rooms:b.rooms.map(r=>r.id===roomId?{...r,auditStatus:byId('a-roomAudit').value,availabilityStatus:byId('a-roomAvailability').value,tenantDisplayStatus:byId('a-roomDisplay').value,statusNote:byId('a-roomStatusNote').value,riskNote:byId('a-roomRiskNote').value}:r)}:b);saveState();setFlash('good','房间详情已更新。')}
    function batchRooms(buildingId,mode){if(!adminBatch.length){setFlash('danger','请先选择至少一个房间。');return}state.buildings=state.buildings.map(b=>b.id===buildingId?{...b,rooms:b.rooms.map(r=>!adminBatch.includes(r.id)?r:mode==='approve'?{...r,auditStatus:'已审核通过',tenantDisplayStatus:'可咨询'}:mode==='return'?{...r,auditStatus:'待补充',tenantDisplayStatus:'暂停推荐'}:{...r,tenantDisplayStatus:'暂停推荐'})}:b);saveState();setFlash(mode==='approve'?'good':'info','批量操作已完成。')}
    function render(){const app=byId('app'),hash=h();if(hash.startsWith('login-')){app.innerHTML=loginView(hash.replace('login-',''));return}if(['broker','tenant','admin'].includes(hash)){if(!session||session.role!==hash){location.hash='login-'+hash;return}app.innerHTML=hash==='broker'?brokerPage():hash==='tenant'?tenantPage():adminPage();return}app.innerHTML=home()}
    window.handleLogin=handleLogin;window.logout=logout;window.loadBroker=loadBroker;window.resetForm=resetForm;window.saveForm=saveForm;window.toggleCompare=toggleCompare;window.pickBuilding=pickBuilding;window.pickRoom=pickRoom;window.toggleRoom=toggleRoom;window.toggleAllRooms=toggleAllRooms;window.saveAdminBuilding=saveAdminBuilding;window.saveAdminRoom=saveAdminRoom;window.batchRooms=batchRooms;window.addEventListener('hashchange',()=>{flash=null;render()});render();
  </script>
