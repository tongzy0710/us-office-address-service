<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>美国办公室地址服务系统</title>
    <style>
      :root {
        --canvas: #f6f1e8;
        --panel: #fbf8f2;
        --ink: #1f2933;
        --soft: #55616f;
        --muted: #7b8794;
        --accent: #c76832;
        --broker: #c76832;
        --tenant: #2e86ab;
        --admin: #33673b;
        --line: rgba(31, 41, 51, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at top left, rgba(199, 104, 50, 0.12), transparent 28%),
          radial-gradient(circle at bottom right, rgba(46, 134, 171, 0.12), transparent 28%),
          var(--canvas);
        color: var(--ink);
        font-family:
          "Noto Sans SC",
          "PingFang SC",
          "Hiragino Sans GB",
          system-ui,
          sans-serif;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .page {
        max-width: 1480px;
        margin: 0 auto;
        padding: 20px;
      }

      .card,
      .panel,
      .table {
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 28px;
        box-shadow: 0 16px 50px rgba(20, 24, 40, 0.06);
      }

      .hero {
        overflow: hidden;
      }

      .hero-bar {
        height: 10px;
        background: var(--accent);
      }

      .hero-inner {
        padding: 28px;
        display: grid;
        gap: 24px;
      }

      .eyebrow {
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: var(--muted);
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      .hero-title {
        font-size: clamp(32px, 5vw, 56px);
        line-height: 1.1;
      }

      .hero-copy,
      .muted {
        color: var(--soft);
        line-height: 1.8;
      }

      .grid-3,
      .grid-2,
      .grid-4 {
        display: grid;
        gap: 20px;
      }

      .grid-3 {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .grid-4 {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .grid-2 {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .section {
        margin-top: 22px;
      }

      .section-title {
        font-size: 20px;
        font-weight: 700;
        margin-bottom: 14px;
      }

      .panel {
        padding: 22px;
      }

      .portal-card {
        padding: 24px;
        transition: transform 0.2s ease;
      }

      .portal-card:hover {
        transform: translateY(-2px);
      }

      .portal-bar {
        height: 10px;
        width: 92px;
        border-radius: 999px;
        margin-bottom: 18px;
      }

      .chip-row,
      .row-actions,
      .tabs,
      .filters,
      .compare-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 7px 12px;
        font-size: 12px;
        font-weight: 700;
        background: rgba(31, 41, 51, 0.06);
      }

      .chip.good {
        background: #dff7e6;
        color: #135d26;
      }

      .chip.warn {
        background: #fff1c7;
        color: #7a5700;
      }

      .chip.info {
        background: #dff1fb;
        color: #0d5270;
      }

      .chip.danger {
        background: #ffe0e3;
        color: #8e1f2d;
      }

      .btn,
      .ghost-btn,
      .tab-btn {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 11px 16px;
        background: #fff;
        font-weight: 700;
      }

      .btn.primary {
        background: var(--ink);
        color: #fff;
        border-color: transparent;
      }

      .btn.broker {
        background: var(--broker);
        color: #fff;
        border-color: transparent;
      }

      .btn.admin {
        background: var(--admin);
        color: #fff;
        border-color: transparent;
      }

      .tab-btn.active {
        color: #fff;
        border-color: transparent;
      }

      .tab-btn[data-tone="broker"].active {
        background: var(--broker);
      }

      .tab-btn[data-tone="tenant"].active {
        background: var(--tenant);
      }

      .tab-btn[data-tone="admin"].active {
        background: var(--admin);
      }

      .workspace {
        display: grid;
        gap: 20px;
      }

      .broker-layout {
        grid-template-columns: 340px minmax(0, 1fr);
      }

      .desktop-layout {
        grid-template-columns: 280px minmax(0, 1fr) 360px;
      }

      .admin-layout {
        grid-template-columns: 1fr;
      }

      .stack {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .record {
        border: 1px solid var(--line);
        border-radius: 22px;
        background: #fff;
        padding: 16px;
      }

      .record.active {
        border-color: var(--accent);
        background: #fff9f5;
      }

      .meta {
        font-size: 13px;
        color: var(--muted);
      }

      .list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .field-grid {
        display: grid;
        gap: 14px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .field,
      .metric,
      .tile {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .label {
        font-size: 13px;
        font-weight: 700;
      }

      .input,
      .select,
      .textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 12px 14px;
        background: #fff;
      }

      .textarea {
        min-height: 86px;
        resize: vertical;
      }

      .check-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .toggle {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 10px 13px;
        background: #fff;
        font-size: 13px;
      }

      .toggle.active {
        background: #f8e5d8;
        border-color: transparent;
      }

      .table {
        overflow: hidden;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }

      thead {
        background: var(--panel);
        color: var(--muted);
      }

      th,
      td {
        padding: 14px 16px;
        text-align: left;
        border-top: 1px solid var(--line);
        vertical-align: top;
      }

      thead th {
        border-top: none;
      }

      .metric {
        border: 1px solid var(--line);
        border-radius: 24px;
        background: var(--panel);
        padding: 20px;
      }

      .metric-value {
        font-size: 34px;
        font-weight: 700;
      }

      .message {
        border-radius: 22px;
        padding: 14px 16px;
        font-size: 14px;
        font-weight: 700;
      }

      .message.good {
        background: #dff7e6;
        color: #135d26;
      }

      .message.info {
        background: #dff1fb;
        color: #0d5270;
      }

      .message.danger {
        background: #ffe0e3;
        color: #8e1f2d;
      }

      .login-wrap {
        max-width: 1240px;
        margin: 0 auto;
        display: grid;
        gap: 20px;
        grid-template-columns: 1fr 1fr;
        padding: 20px;
      }

      .small {
        font-size: 12px;
        color: var(--muted);
      }

      .hidden {
        display: none !important;
      }

      .bullets {
        padding-left: 18px;
        color: var(--soft);
        line-height: 1.9;
      }

      @media (max-width: 1100px) {
        .grid-3,
        .grid-4,
        .grid-2,
        .broker-layout,
        .desktop-layout,
        .login-wrap {
          grid-template-columns: 1fr;
        }

        .field-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      const STATE_KEY = "us-office-service-static-state-v1";
      const SESSION_KEY = "us-office-service-static-session-v1";

      function normalizeText(value) {
        return (value || "").trim().replace(/\s+/g, " ").toLowerCase();
      }

      function normalizeAddress(value) {
        return normalizeText(value).replace(/[,.]/g, "");
      }

      function normalizeSuite(value) {
        return normalizeText(value).replace(/suite/g, "ste").replace(/\s+/g, "");
      }

      function formatMoney(value) {
        return `$${Number(value || 0).toFixed(2)} / 月`;
      }

      function seedState() {
        return {
          contacts: {
            wechat: "ccMonet-service",
            phone: "+1 (669) 555-0198",
            email: "service@ccmonet.example",
          },
          leads: [
            {
              id: "lead-1",
              company: "Shenzhen Seller Ltd.",
              need: "预算 $500 内，需要先注册公司",
              target: "Santa Clara Tech Park / Ste 207",
              owner: "客服 Mia",
              status: "待联系",
            },
            {
              id: "lead-2",
              company: "Hangzhou Cross-border Tech",
              need: "需要可接受的电费账单方案、宽带账单和门牌",
              target: "Downtown San Jose Office / Ste 301",
              owner: "客服 Lynn",

            },
          ],
          buildings: [
            {
              id: "building-1",
              name: "Santa Clara Tech Park",
              rawAddress: "4701 Patrick Henry Dr, Santa Clara, CA 95054",
              standardizedAddress: normalizeAddress("4701 Patrick Henry Dr, Santa Clara, CA 95054"),
              city: "Santa Clara",
              state: "CA",
              zip: "95054",
              reviewStatus: "已审核通过",
              paymentFlowStatus: "接受",
              paymentFlowNote: "支持先付 1 个月押金锁定地址，注册成功后再签正式合同。",
              electricBillMode: "主账单 + suite 子账单",
              broadbandBillStatus: "有",
              verificationSource: "后台已复核",
              exteriorDescription: "科技园园区办公楼，商务属性明确。",
              neighborhoodDescription: "周边公司密集，方便正式经营。",
              currentMaintainerBrokerId: "broker:13800000001",
              currentMaintainerBrokerName: "湾区合作中介 A",
              maintenanceNote: "同地址同 Suite 一期不允许重复创建。",
              brokerVisibleHint: "可继续补录其他 suite。",
              outsidePhotoCount: 3,
              rooms: [
                {
                  id: "room-1",
                  suite: "Ste 207",
                  locationDescription: "2F / near elevator",
                  sizeSf: 319,
                  rentUsd: 478.5,
                  availabilityStatus: "当前可用",
                  auditStatus: "已审核通过",
                  tenantDisplayStatus: "可咨询",
                  statusNote: "曾租给跨境电商公司，历史注册地址已清理。",
                  statusTags: ["曾租给跨境电商公司", "历史注册地址已清理"],
                  rentIncludes: ["物业费", "宽带费", "信件代收"],
                  furnitureOptions: ["可以付费租赁家具"],
                  lockOptions: ["可独立上锁", "可制作专属公司门牌"],
                  mailScan: "提供，但需要收费",
                  forwarding: "可以免费提供部分，超出部分收费",
                  paymentMethod: "Bank Transfer",
                  leaseTerm: "12 months",
                  depositText: "1 个月押金",
                  suitability: "是",
                  riskNote: "",
                  insidePhotoCount: 3,
                },
                {
                  id: "room-2",
                  suite: "Ste 207D",
                  locationDescription: "2F east side",
                  sizeSf: 175,
                  rentUsd: 437.5,
                  availabilityStatus: "待确认",
                  auditStatus: "待补充",
                  tenantDisplayStatus: "暂停推荐",
                  statusNote: "待补门牌号照片。",
                  statusTags: [],
                  rentIncludes: ["物业费", "水电费"],
                  furnitureOptions: ["不提供家具"],
                  lockOptions: ["可独立上锁"],
                  mailScan: "不提供",
                  forwarding: "提供，但需要收费",
                  paymentMethod: "Bank Transfer",
                  leaseTerm: "12 months",
                  depositText: "1 个月押金",
                  suitability: "待判断",
                  riskNote: "门牌号照片未补齐。",
                  insidePhotoCount: 2,
                },
              ],
            },
            {
              id: "building-2",
              name: "Downtown San Jose Office",
              rawAddress: "84 W Santa Clara St, San Jose, CA 95113",
              standardizedAddress: normalizeAddress("84 W Santa Clara St, San Jose, CA 95113"),
              city: "San Jose",
              state: "CA",
              zip: "95113",
              reviewStatus: "待审核",
              paymentFlowStatus: "接受",
              paymentFlowNote: "已确认接受标准签约付款流程。",
              electricBillMode: "电力公司直开 suite 账单",
              broadbandBillStatus: "有",
              verificationSource: "中介现场看过样本",
              exteriorDescription: "市中心正式办公楼。",
              neighborhoodDescription: "交通便利。",
              currentMaintainerBrokerId: "broker:13800000002",
              currentMaintainerBrokerName: "硅谷合作中介 B",
              maintenanceNote: "待后台最终确认。",
              brokerVisibleHint: "记录已提交，等待后台审核。",
              outsidePhotoCount: 2,
              rooms: [
                {
                  id: "room-3",
                  suite: "Ste 301",
                  locationDescription: "3F front corner",
                  sizeSf: 260,
                  rentUsd: 620,
                  availabilityStatus: "当前可用",
                  auditStatus: "待审核",
                  tenantDisplayStatus: "暂停推荐",
                  statusNote: "资料完整，等待后台放行。",
                  statusTags: [],
                  rentIncludes: ["物业费", "宽带费"],
                  furnitureOptions: ["可以付费家具摆放，家具由客户自行采购"],
                  lockOptions: ["可独立上锁"],
                  mailScan: "提供，但需要收费",
                  forwarding: "提供，但需要收费",
                  paymentMethod: "Bank Transfer",
                  leaseTerm: "12 months",
                  depositText: "1 个月押金",
                  suitability: "是",
                  riskNote: "",
                  insidePhotoCount: 2,
                },
              ],
            },
          ],
        };
      }

      function loadState() {
        try {
          return JSON.parse(localStorage.getItem(STATE_KEY)) || seedState();
        } catch {
          return seedState();
        }
      }

      function saveState(state) {
        localStorage.setItem(STATE_KEY, JSON.stringify(state));
      }

      function loadSession() {
        try {
          return JSON.parse(localStorage.getItem(SESSION_KEY)) || null;
        } catch {
          return null;
        }
      }

      function saveSession(session) {
        if (session) {
          localStorage.setItem(SESSION_KEY, JSON.stringify(session));
        } else {
          localStorage.removeItem(SESSION_KEY);
        }
      }

      function currentHash() {
        return location.hash.replace(/^#/, "") || "home";
      }

      function createRoomStatus(building, room) {
        if (building.reviewStatus === "地址预审未通过") return "地址预审未通过";
        if (room.auditStatus === "待补充" || building.reviewStatus === "已退回补充") return "待补充";
        if (room.auditStatus === "待审核") return "已提交";
        if (room.auditStatus === "已审核通过") return "已审核";
        return "草稿";
      }

      function chipTone(text) {
        if (/已审核|可咨询|当前可用|接受|通过/.test(text)) return "good";
        if (/待|草稿/.test(text)) return "warn";
        if (/未通过|暂不|不可|退回/.test(text)) return "danger";
        return "info";
      }

      function el(id) {
        return document.getElementById(id);
      }

      let appState = loadState();
      let session = loadSession();
      let brokerTab = "create";
      let selectedBrokerRoomId = "";
      let selectedTenantRoomId = "";
      let selectedCompareRoomIds = [];
      let selectedAdminBuildingId = "";
      let selectedAdminRoomId = "";
      let selectedAdminRoomIds = [];

      const brokerFormTemplate = () => ({
        buildingId: "",
        roomId: "",
        rawAddress: "",
        city: "",
        state: "CA",
        zip: "",
        name: "",
        reviewStatus: "待预审",
        paymentFlowStatus: "待确认",
        paymentFlowNote: "默认期望：先付 1 个月押金锁定地址，注册公司成功后再由新公司主体签正式合同。",
        electricBillMode: "主账单 + suite 子账单",
        broadbandBillStatus: "无",
        verificationSource: "中介口头确认",
        exteriorDescription: "",
        neighborhoodDescription: "",
        outsidePhotoCount: 0,
        suite: "",
        locationDescription: "",
        sizeSf: "",
        rentUsd: "",
        availabilityStatus: "当前可用",
        paymentMethod: "Bank Transfer",
        leaseTerm: "12 months",
        depositText: "1 个月押金",
        statusNote: "",
        statusTags: [],
        rentIncludes: [],
        furnitureOptions: [],
        lockOptions: [],
        mailScan: "不提供",
        forwarding: "不提供",
        suitability: "待判断",
        riskNote: "",
        insidePhotoCount: 0,
      });

      let brokerForm = brokerFormTemplate();
      let flash = null;

      function setFlash(tone, text) {
        flash = { tone, text };
        render();
      }

      function login(role, payload) {
        if (role === "admin") {
          if (payload.username !== "admin" || payload.password !== "ccMonet") {
            setFlash("danger", "管理员账号或密码错误。");
            return;
          }
          session = { role: "admin", id: "admin", name: "管理后台" };
        } else {
          if (!payload.phone.trim()) {
            setFlash("danger", "请输入手机号。");
            return;
          }
          session = {
            role,
            id: `${role}:${payload.phone.trim()}`,
            name: payload.name.trim() || `${role === "broker" ? "中介" : "租客"} ${payload.phone.trim().slice(-4)}`,
            phone: payload.phone.trim(),
          };
        }
        saveSession(session);
        flash = null;
        location.hash = role;
      }

      function logout() {
        session = null;
        saveSession(null);
        flash = null;
        location.hash = "home";
      }

      function tenantListings() {
        return appState.buildings.flatMap((building) =>
          building.rooms
            .filter((room) => building.reviewStatus !== "地址预审未通过" && room.auditStatus === "已审核通过" && room.tenantDisplayStatus !== "暂停推荐")
            .map((room) => ({
              building,
              room,
            })),
        );
      }

      function brokerRooms() {
        if (!session || session.role !== "broker") return [];
        return appState.buildings
          .filter((building) => building.currentMaintainerBrokerId === session.id)
          .flatMap((building) =>
            building.rooms.map((room) => ({
              building,
              room,
              visibleStatus: createRoomStatus(building, room),
            })),
          );
      }

      function brokerListByTab(items) {
        if (brokerTab === "draft") return items.filter((item) => item.room.auditStatus === "草稿");
        if (brokerTab === "supplement") return items.filter((item) => item.room.auditStatus === "待补充" || item.building.reviewStatus === "已退回补充");
        if (brokerTab === "submitted") return items.filter((item) => item.room.auditStatus === "待审核" || item.room.auditStatus === "已审核通过");
        return items;
      }

      function loadBrokerRecord(roomId) {
        const found = brokerRooms().find((item) => item.room.id === roomId);
        if (!found) return;
        selectedBrokerRoomId = roomId;
        const { building, room } = found;
        brokerForm = {
          ...brokerFormTemplate(),
          buildingId: building.id,
          roomId: room.id,
          rawAddress: building.rawAddress,
          city: building.city,
          state: building.state,
          zip: building.zip,
          name: building.name,
          reviewStatus: building.reviewStatus,
          paymentFlowStatus: building.paymentFlowStatus,
          paymentFlowNote: building.paymentFlowNote,
          electricBillMode: building.electricBillMode,
          broadbandBillStatus: building.broadbandBillStatus,
          verificationSource: building.verificationSource,
          exteriorDescription: building.exteriorDescription,
          neighborhoodDescription: building.neighborhoodDescription,
          outsidePhotoCount: building.outsidePhotoCount || 0,
          suite: room.suite,
          locationDescription: room.locationDescription,
          sizeSf: room.sizeSf,
          rentUsd: room.rentUsd,
          availabilityStatus: room.availabilityStatus,
          paymentMethod: room.paymentMethod,
          leaseTerm: room.leaseTerm,
          depositText: room.depositText,
          statusNote: room.statusNote,
          statusTags: room.statusTags || [],
          rentIncludes: room.rentIncludes || [],
          furnitureOptions: room.furnitureOptions || [],
          lockOptions: room.lockOptions || [],
          mailScan: room.mailScan,
          forwarding: room.forwarding,
          suitability: room.suitability,
          riskNote: room.riskNote || "",
          insidePhotoCount: room.insidePhotoCount || 0,
        };
        brokerTab = "create";
        render();
      }

      function saveBrokerForm(mode) {
        if (!session || session.role !== "broker") return;
        const rawAddress = brokerForm.rawAddress.trim();
        const suite = brokerForm.suite.trim();
        if (!rawAddress || !suite) {
          setFlash("danger", "完整地址和 Suite / 房间号不能为空。");
          return;
        }
        if (mode === "submit" && (Number(brokerForm.outsidePhotoCount) < 2 || Number(brokerForm.insidePhotoCount) < 2)) {
          setFlash("danger", "提交前请补齐外围至少 2 张、房间内部至少 2 张照片。");
          return;
        }

        const standardizedAddress = normalizeAddress(rawAddress);
        const normalizedSuite = normalizeSuite(suite);
        const otherBuilding = appState.buildings.find(
          (item) =>
            item.standardizedAddress === standardizedAddress &&
            item.currentMaintainerBrokerId !== session.id &&
            item.id !== brokerForm.buildingId,
        );
        if (otherBuilding) {
          setFlash("danger", `该地址已由 ${otherBuilding.currentMaintainerBrokerName} 维护，请联系后台转交。`);
          return;
        }

        let targetBuilding = appState.buildings.find((item) => item.id === brokerForm.buildingId);
        if (!targetBuilding) {
          targetBuilding = appState.buildings.find(
            (item) => item.standardizedAddress === standardizedAddress && item.currentMaintainerBrokerId === session.id,
          );
        }

        if (targetBuilding) {
          const duplicateRoom = targetBuilding.rooms.find(
            (room) => normalizeSuite(room.suite) === normalizedSuite && room.id !== brokerForm.roomId,
          );
          if (duplicateRoom) {
            setFlash("danger", "同一标准化地址 + 同一 Suite 一期不允许重复创建。");
            return;
          }
        }

        const buildingId = targetBuilding ? targetBuilding.id : `building-${Date.now()}`;
        const roomId = brokerForm.roomId || `room-${Date.now()}`;
        const building = targetBuilding || {
          id: buildingId,
          rooms: [],
        };

        const nextBuilding = {
          ...building,
          id: buildingId,
          name: brokerForm.name.trim(),
          rawAddress,
          standardizedAddress,
          city: brokerForm.city.trim(),
          state: brokerForm.state.trim(),
          zip: brokerForm.zip.trim(),
          reviewStatus: targetBuilding && targetBuilding.reviewStatus !== "已退回补充" ? targetBuilding.reviewStatus : "待预审",
          paymentFlowStatus: brokerForm.paymentFlowStatus,
          paymentFlowNote: brokerForm.paymentFlowNote.trim(),
          electricBillMode: brokerForm.electricBillMode,
          broadbandBillStatus: brokerForm.broadbandBillStatus,
          verificationSource: brokerForm.verificationSource,
          exteriorDescription: brokerForm.exteriorDescription.trim(),
          neighborhoodDescription: brokerForm.neighborhoodDescription.trim(),
          currentMaintainerBrokerId: session.id,
          currentMaintainerBrokerName: session.name,
          maintenanceNote: "同地址同 Suite 一期不允许重复创建，如需转维护人，由后台操作。",
          brokerVisibleHint: mode === "submit" ? "记录已提交，等待后台审核。" : "草稿已保存，可继续补录。",
          outsidePhotoCount: Number(brokerForm.outsidePhotoCount || 0),
        };

        const nextRoom = {
          id: roomId,
          suite: suite,
          locationDescription: brokerForm.locationDescription.trim(),
          sizeSf: Number(brokerForm.sizeSf || 0),
          rentUsd: Number(brokerForm.rentUsd || 0),
          availabilityStatus: brokerForm.availabilityStatus,
          auditStatus: mode === "submit" ? "待审核" : "草稿",
          tenantDisplayStatus: "暂停推荐",
          statusNote: brokerForm.statusNote.trim(),
          statusTags: brokerForm.statusTags,
          rentIncludes: brokerForm.rentIncludes,
          furnitureOptions: brokerForm.furnitureOptions,
          lockOptions: brokerForm.lockOptions,
          mailScan: brokerForm.mailScan,
          forwarding: brokerForm.forwarding,
          paymentMethod: brokerForm.paymentMethod.trim(),
          leaseTerm: brokerForm.leaseTerm.trim(),
          depositText: brokerForm.depositText.trim(),
          suitability: brokerForm.suitability,
          riskNote: brokerForm.riskNote.trim(),
          insidePhotoCount: Number(brokerForm.insidePhotoCount || 0),
        };

        nextBuilding.rooms = (nextBuilding.rooms || []).some((room) => room.id === roomId)
          ? nextBuilding.rooms.map((room) => (room.id === roomId ? nextRoom : room))
          : [...(nextBuilding.rooms || []), nextRoom];

        appState.buildings = appState.buildings.some((item) => item.id === buildingId)
          ? appState.buildings.map((item) => (item.id === buildingId ? nextBuilding : item))
          : [nextBuilding, ...appState.buildings];

        saveState(appState);
        selectedBrokerRoomId = roomId;
        brokerTab = mode === "submit" ? "submitted" : "draft";
        setFlash(mode === "submit" ? "info" : "good", mode === "submit" ? "已提交审核。" : "草稿已保存。");
        loadBrokerRecord(roomId);
      }

                <table>
                  <thead>
                    <tr><th>楼栋</th><th>地址</th><th>维护中介</th><th>房间数</th><th>审核状态</th><th>操作</th></tr>
                  </thead>
                  <tbody>
                    ${buildings
                      .map(
                        (item) => `
                      <tr>
                        <td><strong>${item.name}</strong><div class="small">${item.city}</div></td>
                        <td>${item.rawAddress}<div class="small">账单能力：${item.electricBillMode}</div></td>
                        <td>${item.currentMaintainerBrokerName}</td>
                        <td>${item.rooms.length}</td>
                        <td><span class="chip ${chipTone(item.reviewStatus)}">${item.reviewStatus}</span></td>
                        <td><button class="btn" onclick="selectAdminBuilding('${item.id}')">详情</button></td>
                      </tr>
                    `,
                      )
                      .join("")}
                  </tbody>
                </table>
              </div>

              ${
                building
                  ? `
                    <div class="grid-2">
                      <div class="panel">
                        <div class="section-title">楼栋详情</div>
                        <div class="field-grid">
                          <div class="tile"><span class="label">楼栋名称</span><div class="record">${building.name}</div></div>
                          <div class="tile"><span class="label">地址</span><div class="record">${building.rawAddress}</div></div>
                          <div class="tile"><span class="label">电费账单提供能力</span><div class="record">${building.electricBillMode}</div></div>
                          <div class="tile"><span class="label">宽带账单提供能力</span><div class="record">${building.broadbandBillStatus}</div></div>
                        </div>
                        <div class="section field-grid">
                          ${selectField("admin-buildingReviewStatus", "楼栋审核状态", ["待预审", "地址预审待复核", "地址预审未通过", "预审通过", "待审核", "已审核通过", "已退回补充", "暂不采用"], building.reviewStatus)}
                          ${inputField("admin-maintainerName", "维护中介名称", building.currentMaintainerBrokerName)}
                          ${inputField("admin-maintainerId", "维护中介账号 ID", building.currentMaintainerBrokerId)}
                          ${inputField("admin-contactPhone", "客服电话", appState.contacts.phone)}
                          ${inputField("admin-contactWechat", "客服微信", appState.contacts.wechat)}
                          ${inputField("admin-contactEmail", "客服邮箱", appState.contacts.email)}
                        </div>
                        <div class="row-actions section">
                          <button class="btn admin" onclick="saveAdminBuilding('${building.id}')">保存楼栋与联系方式</button>
                        </div>
                      </div>

                      <div class="panel">
                        <div class="section-title">房间审批</div>
                        <div class="row-actions">
                          <button class="btn" onclick="toggleAllAdminRooms('${building.id}')">${selectedAdminRoomIds.length === building.rooms.length ? "取消全选" : "全选当前楼栋房间"}</button>
                          <span class="chip info">已选 ${selectedAdminRoomIds.length} 个房间</span>
                        </div>
                        <div class="table section">
                          <table>
                            <thead>
                              <tr><th>选择</th><th>房间</th><th>月租</th><th>状态</th><th>详情</th></tr>
                            </thead>
                            <tbody>
                              ${building.rooms
                                .map(
                                  (item) => `
                                <tr>
                                  <td><input type="checkbox" ${selectedAdminRoomIds.includes(item.id) ? "checked" : ""} onchange="toggleAdminRoom('${item.id}')" /></td>
                                  <td><strong>${item.suite}</strong><div class="small">${item.locationDescription || ""}</div></td>
                                  <td>${formatMoney(item.rentUsd)}</td>
                                  <td><span class="chip ${chipTone(item.auditStatus)}">${item.auditStatus}</span></td>
                                  <td><button class="btn" onclick="selectAdminRoom('${item.id}')">详情</button></td>
                                </tr>
                              `,
                                )
                                .join("")}
                            </tbody>
                          </table>
                        </div>
                        <div class="row-actions section">
                          <button class="btn admin" onclick="batchAdminRooms('${building.id}','approve')">批量通过</button>
                          <button class="btn" onclick="batchAdminRooms('${building.id}','return')">批量退回补充</button>
                          <button class="btn" onclick="batchAdminRooms('${building.id}','pause')">批量暂停推荐</button>
                        </div>
                      </div>
                    </div>

                    ${
                      room
                        ? `
                          <div class="panel">
                            <div class="section-title">房间详情</div>
                            <div class="field-grid">
                              ${selectField("admin-roomAuditStatus", "房间审核状态", ["草稿", "待审核", "待补充", "已审核通过", "暂不采用"], room.auditStatus)}
                              ${selectField("admin-roomAvailabilityStatus", "当前可租状态", ["当前可用", "已出租", "待确认", "不可租"], room.availabilityStatus)}
                              ${selectField("admin-roomDisplayStatus", "租客端展示状态", ["可咨询", "已出租", "暂停推荐"], room.tenantDisplayStatus)}
                            </div>
                            <div class="section stack">
                              ${textAreaField("admin-roomStatusNote", "房间状态说明", room.statusNote || "")}
                              ${textAreaField("admin-roomRiskNote", "风险备注", room.riskNote || "")}
                            </div>
                            <div class="row-actions section">
                              <button class="btn admin" onclick="saveAdminRoom('${building.id}','${room.id}')">保存房间详情</button>
                            </div>
                          </div>
                        `
                        : ""
                    }

                    <div class="panel">
                      <div class="section-title">租客线索</div>
                      <div class="table">
                        <table>
                          <thead>
                            <tr><th>公司名</th><th>需求</th><th>意向房源</th><th>跟进人</th><th>状态</th></tr>
                          </thead>
                          <tbody>
                            ${appState.leads
                              .map(
                                (lead) => `
                              <tr>
                                <td><strong>${lead.company}</strong></td>
                                <td>${lead.need}</td>
                                <td>${lead.target}</td>
                                <td>${lead.owner}</td>
                                <td><span class="chip ${chipTone(lead.status)}">${lead.status}</span></td>
                              </tr>
                            `,
                              )
                              .join("")}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  `
                  : ""
              }
            </section>
          </div>
        `;
      }

      function renderTop(title, summary, color) {
        return `
          <section class="card hero">
            <div class="hero-bar" style="background:${color}"></div>
            <div class="hero-inner">
              <div>
                <div class="eyebrow">${session ? session.name : ""}</div>
                <h1 class="hero-title" style="font-size:42px">${title}</h1>
                <p class="hero-copy" style="margin-top:12px">${summary}</p>
              </div>
              <div class="row-actions">
                <a class="btn" href="#home">返回首页</a>
                <button class="btn primary" onclick="logout()">退出登录</button>
              </div>
            </div>
          </section>
        `;
      }

      function navBtn(key, label) {
        return `<button class="tab-btn ${brokerTab === key ? "active" : ""}" data-tone="broker" onclick="brokerTab='${key}';render()">${label}</button>`;
      }

      function inputField(id, label, value, type = "text") {
        return `<label class="field"><span class="label">${label}</span><input id="${id}" class="input" type="${type}" value="${String(value ?? "").replace(/"/g, "&quot;")}" /></label>`;
      }

      function selectField(id, label, options, value) {
        return `<label class="field"><span class="label">${label}</span><select id="${id}" class="select">${options
          .map((option) => `<option value="${option}" ${option === value ? "selected" : ""}>${option}</option>`)
          .join("")}</select></label>`;
      }

      function textAreaField(id, label, value) {
        return `<label class="field"><span class="label">${label}</span><textarea id="${id}" class="textarea">${String(value || "")}</textarea></label>`;
      }

      function toggleGroup(id, label, options, values, single) {
        return `
          <div class="field">
            <span class="label">${label}</span>
            <div class="check-grid">
              ${options
                .map(
                  (option) => `
                <button type="button" class="toggle ${values.includes(option) ? "active" : ""}" onclick="toggleChoice('${id}','${option.replace(/'/g, "\\'")}',${single ? "true" : "false"})">${option}</button>
              `,
                )
                .join("")}
            </div>
          </div>
        `;
      }

      function toggleChoice(key, option, single) {
        const current = brokerForm[key] || [];
        if (single) {
          brokerForm[key] = current.includes(option) ? [] : [option];
        } else {
          brokerForm[key] = current.includes(option) ? current.filter((item) => item !== option) : [...current, option];
        }
        render();
      }

      function handleLogin(role) {
        if (role === "admin") {
          login(role, {
            username: el("login-username").value,
            password: el("login-password").value,
          });
          return;
        }
        login(role, {
          phone: el("login-phone").value,
          name: el("login-name").value,
        });
      }

      function resetBrokerForm() {
        selectedBrokerRoomId = "";
        brokerForm = brokerFormTemplate();
        flash = null;
        brokerTab = "create";
        render();
      }

      function captureBrokerForm(mode) {
        [
          "rawAddress",
          "name",
          "city",
          "state",
          "zip",
          "paymentFlowStatus",
          "electricBillMode",
          "broadbandBillStatus",
          "verificationSource",
          "outsidePhotoCount",
          "paymentFlowNote",
          "exteriorDescription",
          "neighborhoodDescription",
          "suite",
          "availabilityStatus",
          "locationDescription",
          "sizeSf",
          "rentUsd",
          "paymentMethod",
          "leaseTerm",
          "depositText",
          "mailScan",
          "forwarding",
          "suitability",
          "insidePhotoCount",
          "statusNote",
          "riskNote",
        ].forEach((key) => {
          const node = el(`broker-${key}`);
          if (node) brokerForm[key] = node.value;
        });
        saveBrokerForm(mode);
      }

      function toggleCompare(roomId) {
        if (selectedCompareRoomIds.includes(roomId)) {
          selectedCompareRoomIds = selectedCompareRoomIds.filter((item) => item !== roomId);
        } else if (selectedCompareRoomIds.length >= 3) {
          selectedCompareRoomIds = [...selectedCompareRoomIds.slice(1), roomId];
        } else {
          selectedCompareRoomIds = [...selectedCompareRoomIds, roomId];
        }
        render();
      }

      function selectAdminBuilding(buildingId) {
        selectedAdminBuildingId = buildingId;
        selectedAdminRoomIds = [];
        const building = appState.buildings.find((item) => item.id === buildingId);
        selectedAdminRoomId = building && building.rooms[0] ? building.rooms[0].id : "";
        render();
      }

      function selectAdminRoom(roomId) {
        selectedAdminRoomId = roomId;
        render();
      }

      function toggleAdminRoom(roomId) {
        selectedAdminRoomIds = selectedAdminRoomIds.includes(roomId)
          ? selectedAdminRoomIds.filter((item) => item !== roomId)
          : [...selectedAdminRoomIds, roomId];
        render();
      }

      function toggleAllAdminRooms(buildingId) {
        const building = appState.buildings.find((item) => item.id === buildingId);
        if (!building) return;
        selectedAdminRoomIds =
          selectedAdminRoomIds.length === building.rooms.length ? [] : building.rooms.map((room) => room.id);
        render();
      }

      function saveAdminBuilding(buildingId) {
        appState.buildings = appState.buildings.map((item) =>
          item.id === buildingId
            ? {
                ...item,
                reviewStatus: el("admin-buildingReviewStatus").value,
                currentMaintainerBrokerName: el("admin-maintainerName").value,
                currentMaintainerBrokerId: el("admin-maintainerId").value,
              }
            : item,
        );
        appState.contacts.phone = el("admin-contactPhone").value;
        appState.contacts.wechat = el("admin-contactWechat").value;
        appState.contacts.email = el("admin-contactEmail").value;
        saveState(appState);
        setFlash("good", "楼栋信息和联系方式已更新。");
      }

      function saveAdminRoom(buildingId, roomId) {
        appState.buildings = appState.buildings.map((building) =>
          building.id === buildingId
            ? {
                ...building,
                rooms: building.rooms.map((room) =>
                  room.id === roomId
                    ? {
                        ...room,
                        auditStatus: el("admin-roomAuditStatus").value,
                        availabilityStatus: el("admin-roomAvailabilityStatus").value,
                        tenantDisplayStatus: el("admin-roomDisplayStatus").value,
                        statusNote: el("admin-roomStatusNote").value,
                        riskNote: el("admin-roomRiskNote").value,
                      }
                    : room,
                ),
              }
            : building,
        );
        saveState(appState);
        setFlash("good", "房间详情已更新。");
      }

      function batchAdminRooms(buildingId, mode) {
        if (!selectedAdminRoomIds.length) {
          setFlash("danger", "请先选择至少一个房间。");
          return;
        }
        appState.buildings = appState.buildings.map((building) =>
          building.id === buildingId
            ? {
                ...building,
                rooms: building.rooms.map((room) => {
                  if (!selectedAdminRoomIds.includes(room.id)) return room;
                  if (mode === "approve") {
                    return { ...room, auditStatus: "已审核通过", tenantDisplayStatus: "可咨询" };
                  }
                  if (mode === "return") {
                    return { ...room, auditStatus: "待补充", tenantDisplayStatus: "暂停推荐" };
                  }
                  return { ...room, tenantDisplayStatus: "暂停推荐" };
                }),
              }
            : building,
        );
        saveState(appState);
        setFlash(mode === "approve" ? "good" : "info", "批量操作已完成。");
      }

      function render() {
        const hash = currentHash();
        const app = el("app");
        if (!app) return;

        if (hash.startsWith("login-")) {
          app.innerHTML = renderLogin(hash.replace("login-", ""));
          return;
        }

        if (["broker", "tenant", "admin"].includes(hash)) {
          if (!session || session.role !== hash) {
            location.hash = `login-${hash}`;
            return;
          }
          app.innerHTML = hash === "broker" ? renderBroker() : hash === "tenant" ? renderTenant() : renderAdmin();
          return;
        }

        app.innerHTML = renderHome();
      }

      window.handleLogin = handleLogin;
      window.loadBrokerRecord = loadBrokerRecord;
      window.resetBrokerForm = resetBrokerForm;
      window.captureBrokerForm = captureBrokerForm;
      window.toggleChoice = toggleChoice;
      window.toggleCompare = toggleCompare;
      window.selectAdminBuilding = selectAdminBuilding;
      window.selectAdminRoom = selectAdminRoom;
      window.toggleAdminRoom = toggleAdminRoom;
      window.toggleAllAdminRooms = toggleAllAdminRooms;
      window.saveAdminBuilding = saveAdminBuilding;
      window.saveAdminRoom = saveAdminRoom;
      window.batchAdminRooms = batchAdminRooms;
      window.logout = logout;

      window.addEventListener("hashchange", () => {
        flash = null;
        render();
      });

      render();
    </script>
  </body>
</html>
