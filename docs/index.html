<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>美国办公室地址服务系统</title>
    <style>
      :root {
        --canvas: #f6f1e8;
        --ink: #1f2933;
        --soft: #55616f;
        --accent: #c76832;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(199, 104, 50, 0.12), transparent 30%),
          radial-gradient(circle at bottom right, rgba(46, 134, 171, 0.12), transparent 30%),
          var(--canvas);
        color: var(--ink);
        font-family:
          "Noto Sans SC",
          "PingFang SC",
          "Hiragino Sans GB",
          system-ui,
          sans-serif;
      }

      .loader {
        width: min(92vw, 520px);
        padding: 28px;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 16px 50px rgba(20, 24, 40, 0.08);
      }

      .eyebrow {
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        color: var(--soft);
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        margin-top: 14px;
        font-size: 30px;
        line-height: 1.2;
      }

      p {
        margin-top: 10px;
        color: var(--soft);
        line-height: 1.8;
      }

      .bar {
        margin-top: 18px;
        width: 100%;
        height: 10px;
        border-radius: 999px;
        background: rgba(199, 104, 50, 0.16);
        overflow: hidden;
      }

      .bar span {
        display: block;
        width: 35%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #c76832, #dd8a4f);
        animation: loading 1.1s ease-in-out infinite alternate;
      }

      @keyframes loading {
        from {
          transform: translateX(-10%);
        }

        to {
          transform: translateX(180%);
        }
      }
    </style>
  </head>
  <body>
    <div class="loader">
      <div class="eyebrow">CC Monet</div>
      <h1>美国办公室地址服务系统</h1>
      <p>正在进入最新演示页面...</p>
      <div class="bar"><span></span></div>
    </div>
    <script>
      const hash = location.hash || "";
      location.replace(`./demo-full.html?v=20260724a${hash}`);
    </script>
  </body>
</html>
