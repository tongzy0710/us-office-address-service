<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>美国办公室地址服务系统 Demo</title>
    <style>
      :root {
        --bg: #f5f1e8;
        --panel: #fffdf8;
        --card: #ffffff;
        --ink: #18212b;
        --soft: #5c6977;
        --line: rgba(24, 33, 43, 0.11);
        --broker: #c96d37;
        --tenant: #2b84a5;
        --ops: #2f6f43;
        --accent: #11243d;
        --green-bg: #e7f6eb;
        --green-fg: #14532d;
        --yellow-bg: #fff3cf;
        --yellow-fg: #8a5a00;
        --red-bg: #fee5e2;
        --red-fg: #9f1c1c;
        --blue-bg: #e3f2fb;
        --blue-fg: #14506a;
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at top left, rgba(201,109,55,.14), transparent 28%),
          radial-gradient(circle at bottom right, rgba(43,132,165,.14), transparent 32%),
          var(--bg);
        color: var(--ink);
        font-family: "PingFang SC", "Noto Sans SC", "Hiragino Sans GB", system-ui, sans-serif;
      }

      body { padding: 18px; }
      h1, h2, h3, h4, p { margin: 0; }
      button, input, select, textarea { font: inherit; }
      button { cursor: pointer; }

      .app {
        max-width: 1460px;
        margin: 0 auto;
      }

      .hero, .card, .panel, .phone, .modal-card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 28px;
        box-shadow: 0 18px 48px rgba(20, 24, 40, 0.07);
      }

      .hero {
        overflow: hidden;
      }

      .hero-top {
        height: 10px;
        background: linear-gradient(90deg, var(--broker), var(--tenant), var(--ops));
      }

      .hero-inner {
        padding: 28px;
        display: grid;
        gap: 24px;
        grid-template-columns: minmax(0, 1.3fr) minmax(340px, .7fr);
      }

      .eyebrow {
        font-size: 12px;
        font-weight: 700;
        letter-spacing: .26em;
        text-transform: uppercase;
        color: var(--soft);
      }

      .title {
        margin-top: 14px;
        font-size: clamp(30px, 5vw, 54px);
        line-height: 1.04;
        letter-spacing: -.02em;
      }

      .copy, .muted {
        color: var(--soft);
        line-height: 1.85;
      }

      .tabs, .chips, .actions, .legend, .stat-row, .quick-pills, .filter-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .tab, .btn, .pill {
        border-radius: 999px;
        border: 1px solid var(--line);
        background: white;
        padding: 10px 16px;
        font-weight: 700;
      }

      .tab.active {
        color: white;
        border-color: transparent;
      }

      .tab[data-route="overview"].active { background: var(--accent); }
      .tab[data-route="broker"].active { background: var(--broker); }
      .tab[data-route="tenant"].active { background: var(--tenant); }
      .tab[data-route="ops"].active { background: var(--ops); }

      .btn.primary { background: var(--accent); color: white; border-color: transparent; }
      .btn.broker { background: var(--broker); color: white; border-color: transparent; }
      .btn.tenant { background: var(--tenant); color: white; border-color: transparent; }
      .btn.ops { background: var(--ops); color: white; border-color: transparent; }
      .btn.subtle { background: var(--panel); }

      .pill {
        padding: 8px 12px;
        font-size: 12px;
      }

      .pill.green { background: var(--green-bg); color: var(--green-fg); }
      .pill.yellow { background: var(--yellow-bg); color: var(--yellow-fg); }
      .pill.red { background: var(--red-bg); color: var(--red-fg); }
      .pill.blue { background: var(--blue-bg); color: var(--blue-fg); }

      .screen {
        display: none;
        margin-top: 20px;
      }

      .screen.active { display: block; }

      .grid-3 {
        display: grid;
        gap: 18px;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .grid-2 {
        display: grid;
        gap: 18px;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      }

      .layout {
        display: grid;
        gap: 20px;
        grid-template-columns: 360px minmax(0, 1fr);
      }

      .section {
        padding: 20px;
      }

      .metric {
        padding: 20px;
        background: var(--panel);
      }

      .metric .number {
        margin-top: 12px;
        font-size: 34px;
        font-weight: 800;
      }

      .metric .small {
        margin-top: 8px;
        color: var(--soft);
        font-size: 13px;
      }

      .record {
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 22px;
        background: white;
      }

      .record h3 {
        font-size: 20px;
      }

      .field-grid {
        display: grid;
        gap: 14px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .field {
        display: grid;
        gap: 8px;
      }

      label {
        font-size: 13px;
        font-weight: 700;
      }

      .helper {
        font-size: 12px;
        color: var(--soft);
      }

      .input, .select, .textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 12px 14px;
        background: white;
      }

      .textarea {
        min-height: 96px;
        resize: vertical;
      }

      .note {
        border-radius: 20px;
        background: var(--panel);
        padding: 14px 16px;
        color: var(--soft);
        line-height: 1.8;
      }

      .stack {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .phone {
        background: #10161d;
        padding: 12px;
        border-radius: 36px;
      }

      .phone-inner {
        background: var(--bg);
        border-radius: 26px;
        padding: 16px;
      }

      .notch {
        width: 72px;
        height: 6px;
        border-radius: 999px;
        background: rgba(16, 22, 29, .12);
        margin: 0 auto 14px;
      }

      .light {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        border-radius: 999px;
        font-weight: 800;
      }

      .light::before {
        content: "";
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: currentColor;
      }

      .light.green { background: var(--green-bg); color: var(--green-fg); }
      .light.yellow { background: var(--yellow-bg); color: var(--yellow-fg); }
      .light.red { background: var(--red-bg); color: var(--red-fg); }

      .checklist {
        display: grid;
        gap: 10px;
      }

      .check-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 14px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: white;
      }

      .check-item small {
        display: block;
        margin-top: 4px;
        color: var(--soft);
      }

      .switch {
        min-width: 54px;
        height: 32px;
        padding: 4px;
        border-radius: 999px;
        background: rgba(24, 33, 43, .14);
        position: relative;
        border: none;
      }

      .switch::after {
        content: "";
        position: absolute;
        top: 4px;
        left: 4px;
        width: 24px;
        height: 24px;
        border-radius: 50%;
        background: white;
        box-shadow: 0 2px 10px rgba(0,0,0,.18);
        transition: transform .18s ease;
      }

      .switch.on { background: var(--accent); }
      .switch.on::after { transform: translateX(22px); }

      .progress {
        height: 12px;
        border-radius: 999px;
        background: rgba(24, 33, 43, .08);
        overflow: hidden;
      }

      .progress > span {
        display: block;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--broker), var(--tenant));
      }

      .table {
        width: 100%;
        border-collapse: collapse;
      }

      .table th, .table td {
        padding: 12px 10px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        vertical-align: top;
      }

      .table th {
        color: var(--soft);
        font-size: 12px;
        letter-spacing: .12em;
        text-transform: uppercase;
      }

      .listing-card {
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 22px;
        background: white;
        display: grid;
        gap: 12px;
      }

      .listing-top {
        display: flex;
        justify-content: space-between;
        gap: 16px;
      }

      .price {
        font-size: 28px;
        font-weight: 800;
      }

      .cover {
        height: 180px;
        border-radius: 20px;
        background:
          linear-gradient(135deg, rgba(201,109,55,.22), rgba(43,132,165,.12)),
          linear-gradient(180deg, #fdf6ef, #ffffff);
        border: 1px solid rgba(24,33,43,.08);
        position: relative;
        overflow: hidden;
      }

      .cover::after {
        content: attr(data-label);
        position: absolute;
        left: 16px;
        bottom: 16px;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(255,255,255,.92);
        font-size: 12px;
        font-weight: 800;
      }

      .home-link {
        display: block;
        padding: 24px;
      }

      .accent-bar {
        width: 92px;
        height: 10px;
        border-radius: 999px;
      }

      .queue-item {
        display: grid;
        gap: 10px;
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 20px;
        background: white;
      }

      .modal {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background: rgba(16,22,29,.42);
        z-index: 50;
      }

      .modal.active { display: flex; }

      .modal-card {
        width: min(680px, 100%);
        padding: 24px;
      }

      .share-card {
        border-radius: 28px;
        background:
          linear-gradient(135deg, rgba(201,109,55,.9), rgba(17,36,61,.96));
        padding: 24px;
        color: white;
      }

      .share-card .share-title {
        margin-top: 10px;
        font-size: 30px;
        line-height: 1.1;
      }

      .share-grid {
        display: grid;
        gap: 12px;
        margin-top: 18px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .share-cell {
        background: rgba(255,255,255,.14);
        border: 1px solid rgba(255,255,255,.16);
        border-radius: 18px;
        padding: 14px;
      }

      .muted-white {
        color: rgba(255,255,255,.82);
      }

      .empty {
        padding: 26px 18px;
        text-align: center;
        color: var(--soft);
        border: 1px dashed var(--line);
        border-radius: 20px;
      }

      @media (max-width: 1160px) {
        .hero-inner, .layout, .grid-2, .grid-3, .field-grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 780px) {
        body { padding: 12px; }
        .hero-inner, .section, .home-link, .metric { padding: 18px; }
        .title { font-size: 34px; }
        .price { font-size: 24px; }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <section class="hero">
        <div class="hero-top"></div>
        <div class="hero-inner">
          <div>
            <div class="eyebrow">CC Monet Product Demo</div>
            <h1 class="title">合规办公室平台 Demo</h1>
            <p class="copy" style="margin-top: 14px;">
              这版 demo 完全按照最新产品方案重做，重点展示物业前置自动预审、物业级与房间级分层、必录项与非必录项、自动上架与例外人工介入、租客匿名浏览与留资、以及渠道转发卡片。
            </p>
            <div class="legend" style="margin-top: 18px;">
              <span class="pill green">绿灯：适合继续录入</span>
              <span class="pill yellow">黄灯：可补充再判断</span>
              <span class="pill red">红灯：不建议继续</span>
              <span class="pill blue">自动上架：达到分数线后无需等待</span>
            </div>
          </div>
          <div class="panel section">
            <div class="tabs">
              <button class="tab active" data-route="overview">总览</button>
              <button class="tab" data-route="broker">中介端</button>
              <button class="tab" data-route="tenant">租客端</button>
              <button class="tab" data-route="ops">运营端</button>
            </div>
            <div class="note" style="margin-top: 18px;">
              你可以直接切换三端，模拟“地址输入后自动预审”“逐步补资料后分数提升”“达到阈值自动上架”“低分例外进入人工确认”“租客留资后才展示联系方式”“生成渠道转发卡片”等关键流程。
            </div>
            <div class="stat-row" style="margin-top: 18px;">
              <div class="pill blue">PC 主操作：租客端 / 运营端</div>
              <div class="pill blue">手机友好：中介端</div>
              <div class="pill blue">无须每一步等待审批</div>
            </div>
          </div>
        </div>
      </section>

      <section id="overview" class="screen active"></section>
      <section id="broker" class="screen"></section>
      <section id="tenant" class="screen"></section>
      <section id="ops" class="screen"></section>
    </div>

    <div class="modal" id="modal">
      <div class="modal-card" id="modal-card"></div>
    </div>

    <script>
      const propertyTemplates = {
        green: {
          id: "p-green",
          name: "Santa Clara Tech Park",
          address: "4701 Patrick Henry Dr, Santa Clara, CA 95054",
          city: "Santa Clara",
          propertyType: "独立办公室物业",
          operatingAllowed: true,
          leaseAllowed: true,
          videoSupport: true,
          billsIncluded: ["物业费", "宽带费", "收件费"],
          extraFee: "若客户要求独立电表或额外网络专线，按物业方案另行报价。",
          paymentFlow: "接受",
          score: 82,
          light: "green",
          room: {
            suite: "Ste 207",
            area: 319,
            rent: 478.5,
            available: true,
            furnished: true,
            priorRegistered: true,
            cleared: true,
            status: "可展示",
            listingScore: 86
          }
        },
        yellow: {
          id: "p-yellow",
          name: "Fremont Gateway Center",
          address: "4288 Stevenson Blvd, Fremont, CA 94538",
          city: "Fremont",
          propertyType: "办公室物业",
          operatingAllowed: true,
          leaseAllowed: true,
          videoSupport: false,
          billsIncluded: ["物业费", "保险费"],
          extraFee: "若需要额外收件和网络支持，需要单独加费。",
          paymentFlow: "待确认",
          score: 63,
          light: "yellow",
          room: {
            suite: "Ste 118",
            area: 240,
            rent: 590,
            available: true,
            furnished: false,
            priorRegistered: false,
            cleared: false,
            status: "待补充",
            listingScore: 68
          }
        },
        red: {
          id: "p-red",
          name: "Sunnyvale Business Hub",
          address: "1250 Borregas Ave, Sunnyvale, CA 94089",
          city: "Sunnyvale",
          propertyType: "混合物业",
          operatingAllowed: false,
          leaseAllowed: false,
          videoSupport: false,
          billsIncluded: ["物业费"],
          extraFee: "暂未确认任何额外服务方案。",
          paymentFlow: "不接受",
          score: 34,
          light: "red",
          room: {
            suite: "Ste 5A",
            area: 225,
            rent: 720,
            available: false,
            furnished: false,
            priorRegistered: true,
            cleared: false,
            status: "暂停推荐",
            listingScore: 28
          }
        }
      };

      const state = {
        route: "overview",
        activeTemplate: "green",
        precheckAddress: propertyTemplates.green.address,
        required: {
          propertyName: true,
          address: true,
          propertyType: true,
          operatingAllowed: true,
          leaseAllowed: true,
          suite: true,
          area: true,
          rent: true,
          available: true,
          priorRegistered: true,
          cleared: true
        },
        optional: {
          videoSupport: true,
          furnished: true,
          extraFee: true,
          paymentFlow: true,
          photoSet: false,
          shareCard: false
        },
        filters: {
          city: "全部",
          paymentFlow: "全部",
          status: "全部"
        },
        selectedTenantId: "p-green",
        leadUnlocked: false,
        leadName: "",
        leadPhone: "",
        opsDecision: {
          "p-yellow": "待人工确认",
          "p-red": "退回补充"
        }
      };

      function currentProperty() {
        return propertyTemplates[state.activeTemplate];
      }

      function allProperties() {
        return Object.values(propertyTemplates);
      }

      function scoreBreakdown(property) {
        const requiredCount = Object.values(state.required).filter(Boolean).length;
        const optionalCount = Object.values(state.optional).filter(Boolean).length;
        const requiredScore = Math.round(requiredCount / 11 * 70);
        const optionalScore = Math.round(optionalCount / 6 * 20);
        const templateBase = property.light === "green" ? 10 : property.light === "yellow" ? 0 : -15;
        const total = Math.max(0, Math.min(100, requiredScore + optionalScore + templateBase));
        return {
          requiredCount,
          optionalCount,
          total,
          canAutoPublish: requiredCount === 11 && total >= 75 && property.light !== "red",
          needsManual: total < 75 || property.light === "red"
        };
      }

      function trafficLight(total, property) {
        if (property.light === "red" || total < 45) return { key: "red", text: "红灯：当前不建议继续作为平台地址推进" };
        if (property.light === "yellow" || total < 75) return { key: "yellow", text: "黄灯：可继续补资料，暂不建议直接自动上架" };
        return { key: "green", text: "绿灯：当前可继续录入，并满足自动上架条件" };
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function money(v) {
        return "$" + Number(v).toLocaleString("en-US", {
          minimumFractionDigits: Number(v) % 1 ? 2 : 0,
          maximumFractionDigits: 2
        });
      }

      function pill(text, color) {
        return `<span class="pill ${color}">${escapeHtml(text)}</span>`;
      }

      function screen(id) {
        return document.getElementById(id);
      }

      function renderTabs() {
        document.querySelectorAll(".tab").forEach((tab) => {
          tab.classList.toggle("active", tab.dataset.route === state.route);
        });
        document.querySelectorAll(".screen").forEach((el) => {
          el.classList.toggle("active", el.id === state.route);
        });
      }

      function renderOverview() {
        const stats = allProperties();
        const autoCount = stats.filter((item) => scoreBreakdown(item).canAutoPublish).length;
        const manualCount = stats.filter((item) => scoreBreakdown(item).needsManual).length;
        screen("overview").innerHTML = `
          <div class="grid-3">
            <div class="metric card">
              <div class="eyebrow">Property</div>
              <div class="number">${stats.length}</div>
              <div class="small">当前演示中的物业样本数</div>
            </div>
            <div class="metric card">
              <div class="eyebrow">Auto Publish</div>
              <div class="number">${autoCount}</div>
              <div class="small">达到自动上架线，无需运营介入</div>
            </div>
            <div class="metric card">
              <div class="eyebrow">Manual Review</div>
              <div class="number">${manualCount}</div>
              <div class="small">低分或命中风险，进入例外人工确认</div>
            </div>
          </div>
          <div class="grid-3" style="margin-top:18px;">
            <a class="card home-link" href="#broker" data-jump="broker">
              <div class="accent-bar" style="background:var(--broker)"></div>
              <h2 style="margin-top:16px;">中介端</h2>
              <p class="copy" style="margin-top:10px;">先输地址就给出绿灯、黄灯、红灯；不需要等审批；边补资料边涨分。</p>
            </a>
            <a class="card home-link" href="#tenant" data-jump="tenant">
              <div class="accent-bar" style="background:var(--tenant)"></div>
              <h2 style="margin-top:16px;">租客端</h2>
              <p class="copy" style="margin-top:10px;">先匿名浏览和筛选，不展示电话；有意向再留资，保护渠道关系。</p>
            </a>
            <a class="card home-link" href="#ops" data-jump="ops">
              <div class="accent-bar" style="background:var(--ops)"></div>
              <h2 style="margin-top:16px;">运营端</h2>
              <p class="copy" style="margin-top:10px;">只处理低分例外和高风险冲突，不介入每一步录入，不做全流程瓶颈。</p>
            </a>
          </div>
          <div class="grid-2" style="margin-top:18px;">
            <div class="card section">
              <div class="section-title"><h3>这版 demo 的核心交互</h3></div>
              <div class="stack" style="margin-top:16px;">
                <div class="record">
                  <strong>1. 物业前置自动预审</strong>
                  <p class="copy" style="margin-top:8px;">输入地址后系统立刻给结论，不需要运营先审核，中介自己决定要不要继续。</p>
                </div>
                <div class="record">
                  <strong>2. 物业级和房间级分层</strong>
                  <p class="copy" style="margin-top:8px;">账单包含项、付款流程、视频核验支持等跟物业走；租金、面积、清退状态跟房间走。</p>
                </div>
                <div class="record">
                  <strong>3. 必录项驱动自动上架</strong>

      function runPrecheckFromInput() {
        const input = (document.getElementById("addressInput")?.value || "").toLowerCase();
        if (input.includes("patrick") || input.includes("4701")) {
          state.activeTemplate = "green";
        } else if (input.includes("stevenson") || input.includes("4288")) {
          state.activeTemplate = "yellow";
        } else if (input.includes("borregas") || input.includes("1250")) {
          state.activeTemplate = "red";
        } else {
          state.activeTemplate = "yellow";
        }
        state.precheckAddress = document.getElementById("addressInput").value;
        render();
      }

            state.route = tab.dataset.route;
            render();
          };
        });

        document.querySelectorAll("[data-jump]").forEach((node) => {
          node.onclick = (e) => {
            e.preventDefault();
            state.route = node.dataset.jump;
            render();
          };
        });

        document.querySelectorAll(".sample-btn").forEach((btn) => {
          btn.onclick = () => {
            state.activeTemplate = btn.dataset.sample;
            state.precheckAddress = currentProperty().address;
            render();
          };
        });

        document.getElementById("runPrecheck")?.addEventListener("click", runPrecheckFromInput);
        document.getElementById("paymentHintBtn")?.addEventListener("click", () => showModal(paymentHint()));
        document.getElementById("openShareCard")?.addEventListener("click", () => showModal(shareCard(currentProperty())));

        document.querySelectorAll(".switch").forEach((btn) => {
          btn.onclick = () => {
            const kind = btn.dataset.kind;
            const key = btn.dataset.key;
            state[kind][key] = !state[kind][key];
            render();
          };
        });

        document.getElementById("tenantCity")?.addEventListener("change", (e) => {
          state.filters.city = e.target.value;
          render();
        });
        document.getElementById("tenantPayment")?.addEventListener("change", (e) => {
          state.filters.paymentFlow = e.target.value;
          render();
        });
        document.getElementById("tenantStatus")?.addEventListener("change", (e) => {
          state.filters.status = e.target.value;
          render();
        });

        document.querySelectorAll(".tenant-detail").forEach((btn) => {
          btn.onclick = () => {
            state.selectedTenantId = btn.dataset.id;
            render();
          };
        });

        document.querySelectorAll(".tenant-share").forEach((btn) => {
          const property = allProperties().find((item) => item.id === btn.dataset.id);
          btn.onclick = () => showModal(shareCard(property));
        });

        document.getElementById("unlockLead")?.addEventListener("click", () => {
          state.leadName = document.getElementById("leadName")?.value || "";
          state.leadPhone = document.getElementById("leadPhone")?.value || "";
          if (!state.leadName || !state.leadPhone) return;
          state.leadUnlocked = true;
          render();
        });

        document.querySelectorAll(".ops-approve").forEach((btn) => {
          btn.onclick = () => {
            const item = allProperties().find((row) => row.id === btn.dataset.id);
            item.light = "green";
            item.score = Math.max(item.score, 78);
            item.room.status = "可展示";
            state.opsDecision[item.id] = "已人工放行";
            render();
          };
        });

        document.querySelectorAll(".ops-return").forEach((btn) => {
          btn.onclick = () => {
            const item = allProperties().find((row) => row.id === btn.dataset.id);
            item.room.status = "待补充";
            state.opsDecision[item.id] = "已退回补充";
            render();
          };
        });

        document.querySelectorAll(".modal-close").forEach((btn) => {
          btn.onclick = hideModal;
        });

        document.getElementById("modal").onclick = (e) => {
          if (e.target.id === "modal") hideModal();
        };
      }

      render();
    </script>
  </body>
</html>
