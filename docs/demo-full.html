<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>美国办公室地址服务系统 Demo</title>
    <link rel="stylesheet" href="./demo.css?v=20260720a" />
  </head>
  <body>
    <div class="wrap">
      <section class="card hero">
        <div class="hero-bar"></div>
        <div class="hero-inner">
          <div>
            <div class="eyebrow">CC Monet Demo</div>
            <h1 class="title">美国办公室地址服务系统</h1>
            <p class="copy" style="margin-top: 12px">
              这一版不再只是流程说明，而是三端都可以点进去操作的工作台演示。你可以直接切换楼栋、录入 Suite、上传照片、查看租客详情，以及在管理端做批量审核。
            </p>
          </div>
          <div class="panel" style="padding: 22px">
            <div class="tabs">
              <button class="tab" data-route="home">总览</button>
              <button class="tab" data-route="broker">中介端</button>
              <button class="tab" data-route="tenant">租客端</button>
              <button class="tab" data-route="admin">管理端</button>
            </div>
            <div class="note" style="margin-top: 16px">
              管理端账号：<strong>admin</strong><br />
              管理端密码：<strong>ccMonet</strong><br />
              中介端上传并保存的照片，会同步显示到租客端详情页和管理端详情页。
            </div>
          </div>
        </div>
      </section>

      <section id="home" class="screen active">
        <div class="cards">
          <a class="card home-link" href="#broker">
            <div class="accent-bar" style="background: var(--broker)"></div>
            <h2 style="margin-top: 16px">中介端</h2>
            <p class="copy" style="margin-top: 10px">
              手机优先结构，首页一眼就能看到“新增楼栋”，再进入楼栋下维护 Suite 和图片。
            </p>
          </a>
          <a class="card home-link" href="#tenant">
            <div class="accent-bar" style="background: var(--tenant)"></div>
            <h2 style="margin-top: 16px">租客端</h2>
            <p class="copy" style="margin-top: 10px">
              免登录浏览房源，先看 Suite 列表，点击详情后再带出楼栋能力和全部照片。
            </p>
          </a>
          <a class="card home-link" href="#admin">
            <div class="accent-bar" style="background: var(--admin)"></div>
            <h2 style="margin-top: 16px">管理端</h2>
            <p class="copy" style="margin-top: 10px">
              先按楼栋审核，再看房间详情，可批量通过、退回补充或标记已出租。
            </p>
          </a>
        </div>
      </section>

      <section id="broker" class="screen">
        <div id="broker-app"></div>
      </section>

      <section id="tenant" class="screen">
        <div id="tenant-app"></div>
      </section>

      <section id="admin" class="screen">
        <div id="admin-app"></div>
      </section>
    </div>

    <div id="tenant-modal" class="modal">
      <div class="modal-card" id="tenant-modal-card"></div>
    </div>

    <script src="./demo-data.js?v=20260720a"></script>
    <script src="./demo-render-a.js?v=20260720a"></script>
    <script src="./demo-render-b.js?v=20260720a"></script>
    <script src="./demo-events.js?v=20260720a"></script>
  </body>
</html>
